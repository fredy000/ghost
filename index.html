<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הבית הארור 👻</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Heebo:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0812;--bg2:#110f1e;--bg3:#1a1730;--bg4:#252040;
  --blood:#c0392b;--ghost:#6c3aed;--ghost2:#a78bfa;
  --gold:#d97706;--gold2:#fbbf24;--green:#059669;
  --text:#e8e0f8;--muted:#7c6f9f;--dim:#3a3355;
}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;overflow:hidden;}

/* SCREENS */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;}
.screen.on{display:flex;}

/* ===== LANDING ===== */
#s-land{background:radial-gradient(ellipse at 50% 30%,#1a0a3e 0%,var(--bg) 70%);}
.title-pixel{font-family:'Press Start 2P',monospace;font-size:28px;color:var(--ghost2);text-shadow:0 0 20px var(--ghost),0 4px 0 #3a0a8a;margin-bottom:8px;text-align:center;line-height:1.6;}
.sub-pixel{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--muted);text-align:center;margin-bottom:32px;}
.land-card{background:rgba(17,15,30,.95);border:2px solid var(--ghost);border-radius:4px;padding:28px 32px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;box-shadow:0 0 40px rgba(108,58,237,.3);}
.lbl{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:1px;}
.inp{width:100%;background:var(--bg2);border:1px solid var(--dim);color:var(--text);border-radius:3px;padding:10px 12px;font-family:'Heebo',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--ghost2);}
.gender-row{display:flex;gap:8px;}
.gbtn{flex:1;padding:10px;border-radius:3px;border:2px solid var(--dim);background:var(--bg2);color:var(--muted);font-family:'Heebo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;}
.gbtn.on{border-color:var(--ghost2);background:rgba(108,58,237,.25);color:var(--ghost2);}
.av-row{display:flex;gap:6px;flex-wrap:wrap;}
.av{width:36px;height:36px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:2px solid var(--dim);background:var(--bg2);transition:all .15s;}
.av.on{border-color:#fff;background:var(--bg3);}
.c-row{display:flex;gap:6px;flex-wrap:wrap;}
.cdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.cdot.on{border-color:#fff;}
.divider{height:1px;background:var(--dim);}
.btn{border:none;border-radius:3px;padding:12px 20px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;width:100%;}
.btn:hover{filter:brightness(1.15);}
.btn-p{background:var(--ghost);color:#fff;box-shadow:0 0 12px rgba(108,58,237,.4);}
.btn-g{background:var(--bg3);color:var(--text);border:1px solid var(--dim);}
.btn-r{background:var(--blood);color:#fff;}
.btn-gold{background:var(--gold);color:#111;}
.ghost-float{font-size:56px;animation:flt 3s ease-in-out infinite;display:block;text-align:center;margin-bottom:8px;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ===== LOBBY ===== */
#s-lobby{background:var(--bg);}
.lobby-box{background:var(--bg2);border:2px solid var(--ghost);border-radius:4px;padding:24px;max-width:480px;width:100%;box-shadow:0 0 30px rgba(108,58,237,.2);}
.room-code{font-family:'Press Start 2P',monospace;font-size:22px;color:var(--ghost2);letter-spacing:8px;text-align:center;padding:14px;background:var(--bg);border-radius:3px;margin-bottom:14px;border:1px solid var(--ghost);}
.pl-card{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:3px;padding:10px 14px;margin-bottom:8px;border:1px solid var(--dim);}
.pl-card .av-sm{font-size:24px;}
.pl-card .pname{flex:1;font-weight:700;}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}
.bh{background:var(--gold);color:#111;}
.br{background:var(--green);color:#fff;}

/* ===== ROLE ===== */
#s-role{background:var(--bg);}
.role-box{background:var(--bg2);border:3px solid var(--ghost);border-radius:4px;padding:32px 40px;text-align:center;max-width:400px;box-shadow:0 0 40px rgba(108,58,237,.4);}
.r-icon{font-size:80px;margin-bottom:8px;}
.r-title{font-family:'Press Start 2P',monospace;font-size:22px;line-height:1.6;margin-bottom:12px;}
.r-ghost{color:var(--blood);}
.r-human{color:var(--ghost2);}
.r-desc{color:var(--muted);font-size:13px;line-height:1.8;}

/* ===== GAME CANVAS ===== */
#s-game{background:#000;flex-direction:column;}
#game-canvas{display:block;cursor:crosshair;}
.game-ui{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;background:rgba(10,8,18,.9);border-bottom:2px solid var(--ghost);padding:6px 12px;gap:8px;z-index:10;}
.game-ui h1{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--ghost2);}
.ui-turn{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gold2);}
.ui-timer{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--blood);min-width:40px;}
.game-actions{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;padding:8px;background:rgba(10,8,18,.92);border-top:2px solid var(--ghost);z-index:10;}
.act{flex:1;padding:8px 6px;border-radius:3px;border:none;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:8px;line-height:1.5;transition:all .15s;}
.act:hover{filter:brightness(1.2);}
.a-task{background:var(--gold);color:#111;}
.a-kill{background:var(--blood);color:#fff;animation:pkill 1s infinite;}
@keyframes pkill{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.8)}50%{box-shadow:0 0 0 6px rgba(192,57,43,0)}}
.a-rep{background:var(--bg3);color:var(--text);border:1px solid var(--dim);}
.a-end{background:var(--bg3);color:var(--muted);border:1px solid var(--dim);}
.a-wait{background:var(--bg3);color:var(--dim);border:1px solid var(--bg);flex:1;font-family:'Press Start 2P',monospace;font-size:8px;padding:8px;text-align:center;}

/* mini map overlay */
.mini-map{position:fixed;bottom:80px;right:8px;background:rgba(10,8,18,.85);border:1px solid var(--ghost);border-radius:3px;padding:4px;}

/* ===== VOTE ===== */
#s-vote{background:var(--bg);justify-content:flex-start;padding-top:20px;overflow-y:auto;}
.vote-title{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--ghost2);margin-bottom:12px;text-align:center;}
.chat-box{width:100%;max-width:560px;background:var(--bg2);border:1px solid var(--dim);border-radius:3px;padding:10px;max-height:120px;overflow-y:auto;margin-bottom:8px;}
.chat-m{font-size:12px;line-height:1.7;border-bottom:1px solid var(--dim);padding:2px 0;}
.chat-m:last-child{border:none;}
.chat-row{display:flex;gap:6px;width:100%;max-width:560px;margin-bottom:12px;}
.chat-row .inp{flex:1;}
.v-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;width:100%;max-width:560px;margin-bottom:12px;}
.vc{background:var(--bg2);border:2px solid var(--dim);border-radius:3px;padding:10px;text-align:center;cursor:pointer;transition:all .15s;}
.vc:hover{border-color:var(--ghost2);transform:scale(1.03);}
.vc.myv{border-color:var(--blood);}
.vc-av{font-size:28px;}
.vc-nm{font-size:11px;font-weight:700;margin-top:4px;}
.vc-ct{font-size:10px;color:var(--muted);margin-top:2px;}

/* ===== RESULT ===== */
#s-result{background:radial-gradient(ellipse at 50% 30%,#1a0a3e 0%,var(--bg) 70%);}
.res-icon{font-size:80px;animation:flt 2s ease-in-out infinite;text-align:center;}
.res-title{font-family:'Press Start 2P',monospace;font-size:22px;text-align:center;line-height:1.6;margin:16px 0 8px;}
.res-desc{color:var(--muted);max-width:380px;line-height:1.8;text-align:center;font-size:14px;}

/* OVERLAY */
.ov-wrap{position:fixed;inset:0;background:rgba(8,6,20,.92);display:none;align-items:center;justify-content:center;z-index:100;}
.ov-wrap.on{display:flex;}
.ov{background:var(--bg2);border:2px solid var(--ghost);border-radius:4px;padding:28px 32px;max-width:320px;width:100%;text-align:center;box-shadow:0 0 30px rgba(108,58,237,.3);}
.ov h2{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--ghost2);margin-bottom:12px;line-height:1.6;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--ghost);border-radius:2px;}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--dim);border-top-color:var(--ghost2);border-radius:50%;animation:spin .7s linear infinite;margin-left:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LANDING -->
<div id="s-land" class="screen on">
  <span class="ghost-float">👻</span>
  <div class="title-pixel">הבית הארור</div>
  <div class="sub-pixel">HAUNTED HOUSE</div>
  <div class="land-card">
    <div><div class="lbl">שמך</div><input class="inp" id="inp-name" placeholder="Enter name..." maxlength="16"></div>
    <div>
      <div class="lbl">מגדר</div>
      <div class="gender-row">
        <button class="gbtn on" id="gm" onclick="setGender('m')">👨 גבר</button>
        <button class="gbtn" id="gf" onclick="setGender('f')">👩 אישה</button>
      </div>
    </div>
    <div><div class="lbl">דמות</div><div class="av-row" id="av-row"></div></div>
    <div><div class="lbl">צבע</div><div class="c-row" id="c-row"></div></div>
    <div class="divider"></div>
    <button class="btn btn-p" onclick="createRoom()">✨ צור חדר חדש</button>
    <div style="text-align:center;font-size:11px;color:var(--dim)">— או —</div>
    <div><div class="lbl">קוד חדר</div><input class="inp" id="inp-code" placeholder="XXXXXX" maxlength="6" style="letter-spacing:6px;text-align:center;font-size:18px;font-family:monospace"></div>
    <button class="btn btn-g" onclick="joinRoom()">🚪 הצטרף</button>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <div style="font-family:'Press Start 2P',monospace;font-size:14px;color:var(--ghost2);margin-bottom:16px">LOBBY</div>
  <div class="lobby-box">
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:6px">שתף קוד זה עם חבריך:</div>
    <div class="room-code" id="lob-code">------</div>
    <div id="lob-players"></div>
    <div id="lob-status" style="text-align:center;font-size:12px;color:var(--muted);margin:8px 0"></div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
      <button class="btn btn-p" id="btn-start" style="display:none" onclick="hostStart()">▶ התחל משחק!</button>
      <button class="btn btn-g" onclick="leaveRoom()">← צא מהחדר</button>
    </div>
  </div>
</div>

<!-- ROLE -->
<div id="s-role" class="screen">
  <div class="role-box">
    <div class="r-icon" id="r-icon"></div>
    <div class="r-title" id="r-title"></div>
    <div class="r-desc" id="r-desc"></div>
  </div>
  <button class="btn btn-p" style="max-width:260px;margin-top:16px" onclick="enterGame()">הבנתי! משחקים 🎮</button>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="game-ui">
    <div class="game-ui h1" style="font-family:'Press Start 2P',monospace;font-size:11px;color:var(--ghost2)">👁 הבית הארור</div>
    <div class="ui-turn" id="ui-turn">...</div>
    <div class="ui-timer" id="ui-timer">90</div>
  </div>
  <canvas id="game-canvas"></canvas>
  <div class="game-actions" id="game-actions"></div>
</div>

<!-- VOTE -->
<div id="s-vote" class="screen">
  <div class="vote-title">🗳 ישיבת חירום!</div>
  <div class="chat-box" id="chat-box"></div>
  <div class="chat-row">
    <input class="inp" id="chat-in" placeholder="הגד דעתך..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn btn-p" style="width:auto;padding:9px 14px;font-size:13px" onclick="sendChat()">שלח</button>
  </div>
  <div class="v-grid" id="v-grid"></div>
  <button class="btn btn-gold" style="max-width:260px" id="btn-resolve" onclick="resolveVote()">📊 סיים הצבעה</button>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="res-icon" id="res-icon"></div>
  <div class="res-title" id="res-title"></div>
  <div class="res-desc" id="res-desc"></div>
  <button class="btn btn-p" style="max-width:220px;margin-top:20px" onclick="goLand()">🔄 שחק שוב</button>
</div>

<!-- TASK OV -->
<div class="ov-wrap" id="ov-task">
  <div class="ov">
    <h2 id="ov-th"></h2>
    <div style="font-size:52px;margin:10px 0" id="ov-ti"></div>
    <p style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:16px" id="ov-td"></p>
    <button class="btn btn-gold" onclick="completeTask()">✓ השלם</button>
    <br><br><button class="btn btn-g" onclick="closeOv('ov-task')">ביטול</button>
  </div>
</div>

<!-- KILL OV -->
<div class="ov-wrap" id="ov-kill">
  <div class="ov">
    <h2 style="color:var(--blood)">💀 חסל?</h2>
    <div style="font-size:52px;margin:10px 0" id="ov-kav"></div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">חסל את <strong id="ov-knm"></strong>?</p>
    <button class="btn btn-r" onclick="confirmKill()">חסל!</button>
    <br><br><button class="btn btn-g" onclick="closeOv('ov-kill')">ביטול</button>
  </div>
</div>

async function createRoom(){

  myName=document.getElementById('inp-name').value.trim()||'שחקן';
  roomCode=String(Math.floor(100000+Math.random()*900000));
  isHost=true;

  await db.ref('rooms/'+roomCode).set({
    host:myId,phase:'lobby',
    players:{[myId]:me},tasks:{},bodies:{},log:{},chat:{},votes:{},
    doneTasks:0,totalTasks:0,turn:myId,timer:90
  });
  go('s-lobby');
  document.getElementById('lob-code').textContent=roomCode;

async function joinRoom(){
  if(!initFB())return;
  myName=document.getElementById('inp-name').value.trim()||'שחקן';
  const code=document.getElementById('inp-code').value.trim();
  if(code.length!==6){alert('קוד לא תקין');return;}
  const snap=await db.ref('rooms/'+code).get();
  if(!snap.exists()){alert('חדר לא נמצא!');return;}
  const room=snap.val();
  if(room.phase!=='lobby'){alert('המשחק כבר התחיל!');return;}
  roomCode=code;isHost=false;
  const idx=Object.keys(room.players||{}).length;
  const usedC=Object.values(room.players||{}).map(p=>p.color);
  let col=myColor;
  if(usedC.includes(col)){for(let i=0;i<8;i++){if(!usedC.includes(i)){col=i;break;}}}
  myColor=col;
  await db.ref('rooms/'+roomCode+'/players/'+myId).set(mkPlayer(idx));
  go('s-lobby');
  document.getElementById('lob-code').textContent=roomCode;
  listenRoom();
}
function mkPlayer(idx){
  return{id:myId,name:myName,color:myColor,avatar:getAv(),
    alive:true,pos:STARTS[idx%STARTS.length],isGhost:false,tasksDone:0};
}
function leaveRoom(){
  stopListen();clearInterval(timerInt);
  if(roomCode)db.ref('rooms/'+roomCode+'/players/'+myId).remove();
  goLand();
}

    if(!snap||!snap.exists())return;

  });
}
function stopListen(){
  if(roomRef&&roomCode){db.ref('rooms/'+roomCode).off('value',roomRef);roomRef=null;}
}

  else if(s.phase==='game')onGame(s);

  });

  up.tasks=tasks;up.bodies={};up.log={};up.chat={};up.votes={};
  up.doneTasks=0;up.totalTasks=TASK_TILES.length;

// ================================================================
// CANVAS GAME
// ================================================================
let canvas,ctx;
function initCanvas(){
  canvas=document.getElementById('game-canvas');
  const W=window.innerWidth, H=window.innerHeight-90;
  canvas.width=W; canvas.height=H;
  canvas.onclick=onCanvasClick;
  // init player anim states
  if(gs&&gs.players){
    Object.values(gs.players).forEach(p=>{
      playerAnims[p.id]={x:p.pos.x*TSIZE,y:p.pos.y*TSIZE,tx:p.pos.x*TSIZE,ty:p.pos.y*TSIZE,frame:0,ft:0};
    });
  }
  requestAnimationFrame(gameLoop);
}

function gameLoop(ts){
  if(cur()!=='s-game'){requestAnimationFrame(gameLoop);return;}
  const dt=Math.min(ts-lastRender,50);lastRender=ts;
  updateAnims(dt);
  drawGame();
  requestAnimationFrame(gameLoop);
}

function updateAnims(dt){
  if(!gs||!gs.players)return;
  Object.values(gs.players).forEach(p=>{
    if(!playerAnims[p.id]) playerAnims[p.id]={x:p.pos.x*TSIZE,y:p.pos.y*TSIZE,tx:p.pos.x*TSIZE,ty:p.pos.y*TSIZE,frame:0,ft:0};
    const a=playerAnims[p.id];
    a.tx=p.pos.x*TSIZE; a.ty=p.pos.y*TSIZE;
    const dx=a.tx-a.x, dy=a.ty-a.y;
    const speed=4;
    if(Math.abs(dx)>1||Math.abs(dy)>1){
      a.x+=dx*speed*dt/100;
      a.y+=dy*speed*dt/100;
      a.ft+=dt;
      if(a.ft>150){a.ft=0;a.frame=(a.frame+1)%4;}
    }else{a.x=a.tx;a.y=a.ty;a.frame=0;}
  });
  // update particles
  particles=particles.filter(p=>{
    p.life-=dt;p.x+=p.vx*dt/100;p.y+=p.vy*dt/100;p.vy+=0.5;
    return p.life>0;
  });
  // camera follows me
  if(gs&&gs.players&&gs.players[myId]){
    const me=gs.players[myId];
    const a=playerAnims[myId];
    if(a){
      const tw=canvas.width/2,th=(canvas.height)/2;
      cam.x=Math.max(0,Math.min(COLS*TSIZE-canvas.width, a.x-tw+TSIZE/2));
      cam.y=Math.max(0,Math.min(ROWS*TSIZE-canvas.height, a.y-th+TSIZE/2));
    }
  }
}

function drawGame(){
  if(!canvas||!ctx){canvas=document.getElementById('game-canvas');ctx=canvas.getContext('2d');if(!ctx)return;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!gs)return;
  ctx.save();
  ctx.translate(-cam.x,-cam.y);

  // Draw floor tiles
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const t=TILEMAP[r][c];
      const x=c*TSIZE,y=r*TSIZE;
      if(t===0){
        // Wall
        drawPixelRect(ctx,x,y,TSIZE,TSIZE,'#0d0b18');
        // Wall detail
        ctx.fillStyle='#16132a';
        ctx.fillRect(x+2,y+2,TSIZE-4,4);
        ctx.fillRect(x+2,y+TSIZE-6,TSIZE-4,4);
      }else{
        // Floor - find room color
        const rm=ROOMS.find(rm2=>{
          const dx=Math.abs(c-rm2.cx),dy=Math.abs(r-rm2.cy);
          return dx<=2&&dy<=2;
        });
        const fc=rm?rm.color:'#131025';
        ctx.fillStyle=fc;
        ctx.fillRect(x,y,TSIZE,TSIZE);
        // Floor pattern
        ctx.fillStyle='rgba(255,255,255,0.025)';
        if((r+c)%2===0)ctx.fillRect(x,y,TSIZE,TSIZE);
        // Border
        ctx.strokeStyle='rgba(255,255,255,0.05)';
        ctx.strokeRect(x+0.5,y+0.5,TSIZE-1,TSIZE-1);
      }
    }
  }

  // Draw room labels
  ROOMS.forEach(rm=>{
    ctx.font='bold 10px Heebo';
    ctx.fillStyle='rgba(200,180,255,0.4)';
    ctx.textAlign='center';
    ctx.fillText(rm.name,rm.cx*TSIZE+TSIZE/2,(rm.cy-1)*TSIZE+14);
  });

  // Draw tasks
  const tasks=Object.values(gs.tasks||{});
  tasks.forEach(t=>{
    if(t.done)return;
    const x=t.tx*TSIZE,y=t.ty*TSIZE;
    // Glowing task marker
    const pulse=0.6+0.4*Math.sin(Date.now()/400);
    ctx.save();
    ctx.shadowBlur=12*pulse;
    ctx.shadowColor='#d97706';
    ctx.font='22px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(TASKS[t.defIdx].icon,x+TSIZE/2,y+TSIZE/2);
    ctx.restore();
    // Gold border
    ctx.strokeStyle=`rgba(217,119,6,${0.5+0.3*pulse})`;
    ctx.lineWidth=2;
    ctx.strokeRect(x+3,y+3,TSIZE-6,TSIZE-6);
  });

  // Draw bodies
  Object.values(gs.bodies||{}).forEach(b=>{
    const x=b.tx*TSIZE,y=b.ty*TSIZE;
    ctx.font='26px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('💀',x+TSIZE/2,y+TSIZE/2);
    ctx.fillStyle='rgba(192,57,43,0.3)';
    ctx.fillRect(x,y+TSIZE*0.6,TSIZE,TSIZE*0.4);
  });

  // Draw players
  const me=gs.players&&gs.players[myId];
  Object.values(gs.players||{}).forEach(p=>{
    if(!p.alive)return;
    const a=playerAnims[p.id];
    if(!a)return;
    const x=a.x,y=a.y;
    const isMe=(p.id===myId);

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(x+TSIZE/2,y+TSIZE*0.88,TSIZE*0.28,TSIZE*0.1,0,0,Math.PI*2);
    ctx.fill();

    // Body - pixel art style character
    const col=COLORS[p.color];
    const bodyW=TSIZE*0.55, bodyH=TSIZE*0.65;
    const bx=x+(TSIZE-bodyW)/2, by=y+TSIZE*0.2;

    // Suit body
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.roundRect(bx,by,bodyW,bodyH,bodyW*0.3);
    ctx.fill();

    // Helmet/head
    ctx.fillStyle='rgba(180,220,255,0.85)';
    ctx.beginPath();
    ctx.roundRect(bx+bodyW*0.1,by-bodyH*0.35,bodyW*0.8,bodyH*0.45,bodyW*0.4);
    ctx.fill();
    ctx.strokeStyle='rgba(100,160,220,0.6)';
    ctx.lineWidth=1.5;
    ctx.stroke();

    // Avatar inside helmet
    ctx.font=`${TSIZE*0.28}px serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(p.avatar||'🧑',x+TSIZE/2,by-bodyH*0.1);

    // Backpack
    ctx.fillStyle=darken(col,0.7);
    ctx.fillRect(bx-bodyW*0.18,by+bodyH*0.1,bodyW*0.18,bodyH*0.5);

    // Legs (walking animation)
    const legOff=a.frame<2?TSIZE*0.05:-TSIZE*0.05;
    ctx.fillStyle=darken(col,0.8);
    ctx.beginPath();
    ctx.roundRect(bx+bodyW*0.15,by+bodyH*0.85+legOff,bodyW*0.28,bodyH*0.32,4);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(bx+bodyW*0.55,by+bodyH*0.85-legOff,bodyW*0.28,bodyH*0.32,4);
    ctx.fill();

    // Glow for current turn player
    if(gs.turn===p.id){
      ctx.save();
      ctx.shadowBlur=16;
      ctx.shadowColor=col;
      ctx.strokeStyle=col;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.roundRect(bx-2,by-bodyH*0.38,bodyW+4,bodyH+bodyH*0.38+4,bodyW*0.35);
      ctx.stroke();
      ctx.restore();
    }

    // Ghost effect
    if(p.isGhost&&isMe){
      ctx.save();
      ctx.globalAlpha=0.3+0.15*Math.sin(Date.now()/300);
      ctx.fillStyle='rgba(160,100,255,0.5)';
      ctx.beginPath();
      ctx.roundRect(bx-4,by-bodyH*0.4,bodyW+8,bodyH+bodyH*0.4+8,bodyW*0.4);
      ctx.fill();
      ctx.restore();
    }

    // Name tag
    ctx.fillStyle='rgba(0,0,0,0.6)';
    const nw=ctx.measureText(p.name).width+10;
    ctx.fillRect(x+TSIZE/2-nw/2,y-16,nw,14);
    ctx.font='bold 10px Heebo';
    ctx.fillStyle=isMe?'#fbbf24':COLORS[p.color];
    ctx.textAlign='center';
    ctx.textBaseline='top';
    ctx.fillText(p.name,x+TSIZE/2,y-15);
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.font=`${p.size}px serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(p.char,p.x,p.y);
  });
  ctx.globalAlpha=1;

  // Darkness overlay (limited vision)
  if(me&&me.alive){
    const a=playerAnims[myId];
    if(a){
      const px=a.x+TSIZE/2-cam.x, py=a.y+TSIZE/2-cam.y;
      const vr=TSIZE*3.5;
      const grad=ctx.createRadialGradient(px+cam.x,py+cam.y,vr*0.4,px+cam.x,py+cam.y,vr*1.2);
      grad.addColorStop(0,'rgba(0,0,0,0)');
      grad.addColorStop(0.6,'rgba(0,0,0,0.15)');
      grad.addColorStop(1,'rgba(0,0,0,0.92)');
      ctx.save();
      ctx.fillStyle=grad;
      ctx.fillRect(cam.x,cam.y,canvas.width,canvas.height);
      ctx.restore();
    }
  }

  ctx.restore();
  updateGameUI();
}

function darken(hex,f){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

function drawPixelRect(c,x,y,w,h,col){
  c.fillStyle=col;c.fillRect(x,y,w,h);
  c.fillStyle='rgba(255,255,255,0.04)';c.fillRect(x,y,w,2);c.fillRect(x,y,2,h);
  c.fillStyle='rgba(0,0,0,0.3)';c.fillRect(x,y+h-2,w,2);c.fillRect(x+w-2,y,2,h);
}

function onCanvasClick(e){
  if(!gs||!gs.players)return;
  const me=gs.players[myId];
  if(!me||!me.alive||gs.turn!==myId)return;
  const rect=canvas.getBoundingClientRect();
  const wx=(e.clientX-rect.left+cam.x)/TSIZE;
  const wy=(e.clientY-rect.top+cam.y)/TSIZE;
  const tc=Math.floor(wx),tr=Math.floor(wy);
  moveTo(tr,tc);
}

function updateGameUI(){
  if(!gs)return;
  const isMyTurn=gs.turn===myId;
  const tp=gs.players&&gs.players[gs.turn];
  document.getElementById('ui-turn').textContent=isMyTurn?'🔥 התור שלך!':'⏳ '+(tp?tp.name:'?');
  document.getElementById('ui-timer').textContent=gs.timer||90;
  renderActions();
}

async function moveTo(tr,tc){
  if(!gs||!gs.players)return;
  if(gs.turn!==myId)return;
  const me=gs.players[myId];
  if(!me||!me.alive)return;
  if(TILEMAP[tr]===undefined||TILEMAP[tr][tc]===0)return;
  const dr=Math.abs(me.pos.y-tr), dc=Math.abs(me.pos.x-tc);
  if(dr>1||dc>1){return;} // must step adjacent
  await db.ref('rooms/'+roomCode+'/players/'+myId+'/pos').set({x:tc,y:tr});
  addLog('🚶 '+me.name+' זז');
}

function renderActions(){
  if(!gs||!gs.players)return;
  const me=gs.players[myId];
  const area=document.getElementById('game-actions');
  if(!me){area.innerHTML='';return;}
  if(gs.turn!==myId){area.innerHTML='<div class="a-wait">⏳ ממתין לתור שלך...</div>';return;}
  if(!me.alive){area.innerHTML='<div class="a-wait">☠ צופה בלבד</div>';return;}
  const tasks=Object.values(gs.tasks||{});
  const bodies=Object.values(gs.bodies||{});
  const players=Object.values(gs.players||{});
  const pos=me.pos;
  const taskHere=tasks.find(t=>t.tx===Math.round(pos.x)&&t.ty===Math.round(pos.y)&&!t.done);
  const bodyHere=bodies.find(b=>b.tx===Math.round(pos.x)&&b.ty===Math.round(pos.y));
  const nearby=players.filter(p=>p.id!==myId&&p.alive&&p.pos&&Math.abs(p.pos.x-pos.x)<=1.5&&Math.abs(p.pos.y-pos.y)<=1.5);
  let h='';
  if(taskHere) h+=`<button class="act a-task" onclick="openTask('${taskHere.id}',${taskHere.defIdx})">⚙<br>משימה</button>`;
  if(bodyHere) h+=`<button class="act a-rep" onclick="doReport()">🚨<br>דווח</button>`;
  if(me.isGhost&&nearby.length) h+=`<button class="act a-kill" onclick="pickKill()">💀<br>חסל!</button>`;
  h+=`<button class="act a-end" onclick="endTurn()">➡<br>סיים תור</button>`;
  area.innerHTML=h;
}

      playerAnims[p.id]={x:p.pos.x*TSIZE,y:p.pos.y*TSIZE,tx:p.pos.x*TSIZE,ty:p.pos.y*TSIZE,frame:0,ft:0};

}

// ================================================================
// VOTE
// ================================================================
function onVote(s){
  if(cur()!=='s-vote')go('s-vote');
  renderVote(s);
}
function renderVote(s){
  const chat=Object.values(s.chat||{}).sort((a,b)=>a.ts-b.ts);
  const cb=document.getElementById('chat-box');
  cb.innerHTML=chat.map(m=>`<div class="chat-m"><span style="font-weight:700;color:${m.color||'#a78bfa'}">${m.name}: </span>${m.msg}</div>`).join('');
  cb.scrollTop=cb.scrollHeight;
  const votes=s.votes||{},myVote=votes[myId];
  const alive=Object.values(s.players||{}).filter(p=>p.alive);
  document.getElementById('v-grid').innerHTML=
    alive.map(p=>`<div class="vc${myVote===p.id?' myv':''}" onclick="castVote('${p.id}')">
      <div class="vc-av">${p.avatar||'🧑'}</div>
      <div class="vc-nm" style="color:${COLORS[p.color]}">${p.name}${p.id===myId?' (אני)':''}</div>
      <div class="vc-ct">${Object.values(votes).filter(v=>v===p.id).length} קולות</div></div>`
    ).join('')+`<div class="vc" onclick="castVote('skip')"><div class="vc-av">⏭</div><div class="vc-nm" style="color:var(--muted)">דלג</div></div>`;
  document.getElementById('btn-resolve').style.display=isHost?'block':'none';
}
async function castVote(tid){await db.ref('rooms/'+roomCode+'/votes/'+myId).set(tid);}
async function sendChat(){
  const inp=document.getElementById('chat-in');const msg=inp.value.trim();if(!msg)return;
  const me=gs.players[myId];
  await db.ref('rooms/'+roomCode+'/chat/c'+Date.now()+'x').set({name:me.name,msg,color:COLORS[me.color],ts:Date.now()});
  inp.value='';
}
async function resolveVote(){
  if(!isHost||!gs)return;
  const votes=gs.votes||{};const tally={};
  Object.values(votes).forEach(v=>{if(v!=='skip')tally[v]=(tally[v]||0)+1;});
  const sorted=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  if(sorted.length){
    const ejId=sorted[0][0];const ej=gs.players[ejId];
    if(ej){
      await db.ref('rooms/'+roomCode+'/players/'+ejId+'/alive').set(false);
      addLog('🗳 '+ej.name+' הוצא','lv');
      if(ej.isGhost){await doResult('humans');return;}
    }
  }else addLog('🗳 לא הוצבע','lv');
  checkWin(gs);
  const next=nextTurn(gs.turn);
  await db.ref('rooms/'+roomCode).update({phase:'game',turn:next,timer:90,votes:{},chat:{}});
}

// ================================================================
// TIMER
// ================================================================
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(async()=>{
    if(!gs||gs.phase!=='game')return;
    const t=Math.max((gs.timer||1)-1,0);
    const el=document.getElementById('ui-timer');if(el)el.textContent=t;
    if(isHost){
      await db.ref('rooms/'+roomCode+'/timer').set(t);
      if(t<=0){addLog('⏰ הזמן נגמר');await endTurn();}
    }
  },1000);
}
async function endTurn(){
  clearInterval(timerInt);
  const next=nextTurn(gs?gs.turn:myId);
  await db.ref('rooms/'+roomCode).update({turn:next,timer:90});
  startTimer();
}
function nextTurn(cur2){
  if(!gs||!gs.players)return cur2;
  const alive=Object.values(gs.players).filter(p=>p.alive);
  const idx=alive.findIndex(p=>p.id===cur2);
  return alive[(idx+1)%alive.length]?.id||alive[0]?.id||cur2;
}

// ================================================================
// WIN
// ================================================================
async function checkWin(s){
  if(!isHost||!s||s.phase==='vote'||s.phase==='result')return;
  const alive=Object.values(s.players||{}).filter(p=>p.alive);
  const ghost=alive.find(p=>p.isGhost);
  const humans=alive.filter(p=>!p.isGhost);
  if(!ghost){await doResult('humans');return;}
  if(humans.length<=1){await doResult('ghost');return;}
  if((s.doneTasks||0)>=(s.totalTasks||1)&&(s.totalTasks||0)>0){await doResult('humans');return;}
}
async function doResult(w){clearInterval(timerInt);await db.ref('rooms/'+roomCode).update({phase:'result',winner:w});}
function onResult(s){
  if(cur()==='s-result')return;
  const ghost=Object.values(s.players||{}).find(p=>p.isGhost);
  if(s.winner==='humans'){
    document.getElementById('res-icon').textContent='🎉';
    document.getElementById('res-title').textContent='האנשים ניצחו!';
    document.getElementById('res-title').style.color='#a78bfa';
    document.getElementById('res-desc').textContent='הרוח הייתה '+(ghost?.name||'?')+'. כל הכבוד!';
  }else{
    document.getElementById('res-icon').textContent='👻';
    document.getElementById('res-title').textContent='הרוח ניצחה!';
    document.getElementById('res-title').style.color='#c0392b';
    document.getElementById('res-desc').textContent=(ghost?.name||'?')+' הייתה הרוח. הבית נשאר ארור לנצח...';
  }
  go('s-result');
}

// ================================================================
// LOG / UTILS
// ================================================================
async function addLog(m,t=''){
  if(!db||!roomCode)return;
  await db.ref('rooms/'+roomCode+'/log/l'+Date.now()+'x').set({m,t,ts:Date.now()});
}
function go(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('on');s.style.display='';});
  const el=document.getElementById(id);if(!el)return;
  el.style.display='flex';el.classList.add('on');
}
function cur(){const el=document.querySelector('.screen.on');return el?el.id:'';}
function openOv(id){const el=document.getElementById(id);if(el)el.classList.add('on');}
function closeOv(id){const el=document.getElementById(id);if(el)el.classList.remove('on');}
function goLand(){stopListen();clearInterval(timerInt);gs=null;roomCode=null;isHost=false;go('s-land');}

// ================================================================
// BOOT
// ================================================================
buildUI();
</script>
</body>
</html>
