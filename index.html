<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הבית הארור 👻</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=Heebo:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08080f;--bg2:#0f0d18;--bg3:#171425;--bg4:#201c30;
  --blood:#c0392b;--ghost:#7c3aed;--ghost2:#a78bfa;
  --gold:#d97706;--gold2:#fbbf24;--green:#059669;--green2:#34d399;
  --text:#ddd6f3;--muted:#7c6f9f;--dim:#4a4266;
}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;}
h1,h2{font-family:'Creepster',cursive;letter-spacing:2px;}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px;}
.screen.on{display:flex;}

/* BUTTONS */
.btn{border:none;border-radius:10px;padding:12px 28px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;width:100%;}
.btn:hover{opacity:.82;}
.btn-purple{background:var(--ghost);color:#fff;}
.btn-red{background:var(--blood);color:#fff;}
.btn-gold{background:var(--gold);color:#111;}
.btn-gray{background:var(--bg3);color:var(--text);border:1px solid var(--bg4);}

/* CARD */
.card{background:var(--bg3);border:1px solid var(--bg4);border-radius:16px;padding:24px;width:100%;max-width:460px;display:flex;flex-direction:column;gap:14px;}

/* INPUTS */
.lbl{font-size:12px;color:var(--muted);margin-bottom:4px;}
.inp{width:100%;background:var(--bg2);border:1px solid var(--bg4);color:var(--text);border-radius:8px;padding:10px 14px;font-family:'Heebo',sans-serif;font-size:15px;outline:none;}
.inp:focus{border-color:var(--ghost);}

/* COLORS */
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0;}
.cdot.sel{border-color:#fff;}

/* GENDER BUTTONS */
.gender-row{display:flex;gap:10px;}
.gbtn{flex:1;padding:10px;border-radius:8px;border:2px solid var(--bg4);background:var(--bg2);color:var(--muted);font-family:'Heebo',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .15s;}
.gbtn.sel{border-color:var(--ghost);background:var(--ghost);color:#fff;}

/* AVATAR ROW */
.avatar-row{display:flex;gap:6px;flex-wrap:wrap;}
.avbtn{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:2px solid transparent;background:var(--bg2);transition:all .15s;}
.avbtn.sel{border-color:#fff;background:var(--bg4);}

/* LOBBY */
.player-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}
.badge-host{background:var(--gold);color:#111;}
.badge-ready{background:var(--green);color:#fff;}

/* ROLE CARD */
.role-card{background:var(--bg3);border:2px solid var(--bg4);border-radius:20px;padding:28px 36px;text-align:center;max-width:420px;}
.role-icon{font-size:72px;margin-bottom:8px;}
.role-title{font-family:'Creepster',cursive;font-size:38px;}
.role-ghost{color:var(--blood);}
.role-human{color:var(--ghost2);}
.role-desc{color:var(--muted);font-size:14px;line-height:1.7;margin-top:10px;}

/* GAME LAYOUT */
#s-game{padding:0;justify-content:flex-start;align-items:stretch;min-height:100vh;}
.gtop{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--bg4);padding:8px 14px;flex-wrap:wrap;gap:6px;}
.gtop h1{font-size:18px;color:var(--ghost2);}
.phase-pill{background:var(--bg4);border-radius:20px;padding:3px 12px;font-size:11px;color:var(--gold2);font-weight:700;letter-spacing:1px;}
.timer{font-family:monospace;font-size:22px;font-weight:700;color:var(--blood);}
.turn-lbl{font-size:12px;color:var(--ghost2);font-weight:700;}

.gbody{display:flex;flex:1;overflow:hidden;}
.sidebar{width:190px;background:var(--bg2);border-right:1px solid var(--bg4);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sb{padding:10px 12px;border-bottom:1px solid var(--bg4);}
.sb h3{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:7px;}
.mp{display:flex;align-items:center;gap:7px;padding:3px 0;}
.mdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mname{font-size:12px;flex:1;}
.tr{display:flex;align-items:flex-start;gap:6px;font-size:11px;margin-bottom:5px;}
.tck{width:13px;height:13px;border-radius:3px;border:1px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;margin-top:1px;}
.tck.done{background:var(--green);border-color:var(--green);}
.pbar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px;}
.pfill{height:100%;background:linear-gradient(90deg,var(--ghost),var(--green2));transition:width .4s;}
.log-item{font-size:10px;line-height:1.9;color:var(--muted);}
.lk{color:var(--blood);}
.lt{color:var(--gold2);}
.lv{color:var(--ghost2);}

.map-wrap{flex:1;overflow:auto;padding:8px;}
.map-grid{display:grid;gap:2px;}
.tile{width:64px;height:64px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;user-select:none;position:relative;}
.tile:hover:not(.wall){transform:scale(1.07);z-index:2;}
.tile.wall{background:#0c0a15;border:1px solid #0f0d1a;cursor:default;}
.tile.wall:hover{transform:none;}
.tile.room{background:var(--bg3);border:1px solid var(--bg4);}
.tile.corr{background:#120f20;border:1px dashed #1e1830;}
.tile.t-task{border-color:var(--gold)!important;box-shadow:0 0 6px rgba(217,119,6,.3);}
.tile.t-me{border-color:var(--ghost2)!important;box-shadow:0 0 10px rgba(124,58,237,.5);}
.tile.t-body{border-color:var(--blood)!important;}
.tile-em{font-size:18px;line-height:1;}
.tile-lb{font-size:8px;color:var(--muted);text-align:center;padding:0 2px;}

.gbot{background:var(--bg2);border-top:1px solid var(--bg4);padding:9px 12px;display:flex;gap:7px;flex-wrap:wrap;}
.act{flex:1;min-width:80px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;transition:opacity .15s;}
.act:hover{opacity:.82;}
.a-task{background:var(--gold);color:#111;}
.a-kill{background:var(--blood);color:#fff;}
.a-report{background:var(--bg4);color:var(--text);}
.a-pass{background:var(--bg3);color:var(--muted);border:1px solid var(--bg4);}
.a-wait{background:var(--bg3);color:var(--dim);border:1px solid var(--bg4);text-align:center;flex:1;padding:10px;border-radius:8px;font-size:12px;}
@keyframes pk{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.7)}50%{box-shadow:0 0 0 8px rgba(192,57,43,0)}}
.a-kill{animation:pk 1s infinite;}

/* VOTE */
#s-vote{justify-content:flex-start;padding-top:24px;}
.chat-box{width:100%;max-width:580px;background:var(--bg3);border-radius:12px;padding:12px;max-height:130px;overflow-y:auto;}
.chat-m{font-size:12px;line-height:1.7;padding:2px 0;border-bottom:1px solid var(--bg4);}
.chat-m:last-child{border:none;}
.chat-row{display:flex;gap:8px;width:100%;max-width:580px;}
.chat-row .inp{flex:1;}
.vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;width:100%;max-width:580px;}
.vc{background:var(--bg3);border:2px solid var(--bg4);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;}
.vc:hover{border-color:var(--ghost);transform:scale(1.03);}
.vc.myv{border-color:var(--blood);}
.vc-av{font-size:28px;}
.vc-nm{font-size:12px;font-weight:700;margin-top:4px;}
.vc-ct{font-size:11px;color:var(--muted);margin-top:2px;}

/* RESULT */
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.res-icon{font-size:80px;animation:flt 2s ease-in-out infinite;display:block;text-align:center;}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(8,8,15,.92);display:none;align-items:center;justify-content:center;z-index:200;}
.overlay.on{display:flex;}
.ov{background:var(--bg2);border:1px solid var(--bg4);border-radius:16px;padding:28px 32px;max-width:340px;width:100%;text-align:center;}
.ov h2{font-family:'Creepster',cursive;font-size:24px;color:var(--ghost2);margin-bottom:10px;}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--dim);border-top-color:var(--ghost2);border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;}

.firebase-err{background:rgba(192,57,43,.15);border:1px solid var(--blood);border-radius:10px;padding:12px;font-size:12px;color:#f1948a;line-height:1.7;display:none;}
</style>
</head>
<body>

<!-- =================== LANDING =================== -->
<div id="s-landing" class="screen on">
  <h1 style="font-size:46px;color:var(--ghost2);text-shadow:0 0 24px var(--ghost)">👻 הבית הארור</h1>
  <div class="card">
    <div id="fb-err" class="firebase-err">⚠️ Firebase לא מוגדר! פתח את הקובץ בעורך טקסט והחלף את FIREBASE_CONFIG.</div>
    <div>
      <div class="lbl">השם שלך</div>
      <input class="inp" id="inp-name" placeholder="שם שחקן..." maxlength="20">
    </div>
    <div>
      <div class="lbl">מגדר</div>
      <div class="gender-row">
        <button class="gbtn sel" id="gbtn-male" onclick="setGender('male')">👨 גבר</button>
        <button class="gbtn" id="gbtn-female" onclick="setGender('female')">👩 אישה</button>
      </div>
    </div>
    <div>
      <div class="lbl">בחר דמות</div>
      <div class="avatar-row" id="avatar-row"></div>
    </div>
    <div>
      <div class="lbl">בחר צבע</div>
      <div class="color-row" id="color-row"></div>
    </div>
    <div style="height:1px;background:var(--bg4)"></div>
    <button class="btn btn-purple" onclick="createRoom()">✨ צור חדר חדש</button>
    <div style="text-align:center;font-size:12px;color:var(--dim)">— או —</div>
    <div>
      <div class="lbl">קוד חדר (להצטרפות)</div>
      <input class="inp" id="inp-code" placeholder="6 ספרות..." maxlength="6" style="letter-spacing:4px;text-align:center;font-size:18px;">
    </div>
    <button class="btn btn-gray" onclick="joinRoom()">🚪 הצטרף לחדר</button>
  </div>
</div>

<!-- =================== LOBBY =================== -->
<div id="s-lobby" class="screen">
  <h1 style="font-size:28px;color:var(--ghost2)">🔒 לובי</h1>
  <div class="card">
    <div style="text-align:center;color:var(--muted);font-size:13px;">
      שתף את הקוד הזה עם חבריך:<br>
      <span id="lob-code" style="font-size:28px;font-weight:700;color:var(--ghost2);letter-spacing:6px;font-family:monospace">------</span>
    </div>
    <div id="lob-players"></div>
    <div id="lob-status" style="text-align:center;font-size:13px;color:var(--muted)"></div>
    <button class="btn btn-purple" id="btn-start" style="display:none" onclick="hostStart()">▶ התחל משחק!</button>
    <button class="btn btn-gray" onclick="leaveRoom()">← צא מהחדר</button>
  </div>
</div>

<!-- =================== ROLE =================== -->
<div id="s-role" class="screen">
  <div class="role-card">
    <div class="role-icon" id="r-icon"></div>
    <div class="role-title" id="r-title"></div>
    <div class="role-desc" id="r-desc"></div>
  </div>
  <button class="btn btn-purple" style="max-width:280px" onclick="goGame()">הבנתי! בואו נשחק 🎮</button>
</div>

<!-- =================== GAME =================== -->
<div id="s-game" class="screen">
  <div class="gtop">
    <h1>👁 הבית הארור</h1>
    <div class="turn-lbl" id="turn-lbl">טוען...</div>
    <div class="phase-pill">חקירה</div>
    <div class="timer" id="timer-el">90</div>
  </div>
  <div class="gbody">
    <div class="sidebar">
      <div class="sb"><h3>שחקנים</h3><div id="pl-list"></div></div>
      <div class="sb">
        <h3>משימות</h3>
        <div id="task-list"></div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px;">
          <span>התקדמות</span><span id="t-pct">0%</span>
        </div>
        <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
      </div>
      <div class="sb" style="flex:1"><h3>יומן</h3><div id="ev-log"></div></div>
    </div>
    <div class="map-wrap"><div class="map-grid" id="map-grid"></div></div>
  </div>
  <div class="gbot" id="actions"></div>
</div>

<!-- =================== VOTE =================== -->
<div id="s-vote" class="screen">
  <h1 style="font-size:28px;color:var(--ghost2)">🗳 ישיבת חירום!</h1>
  <div class="chat-box" id="chat-box"></div>
  <div class="chat-row">
    <input class="inp" id="chat-in" placeholder="הגד את דעתך..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn btn-purple" style="width:auto;padding:9px 16px;font-size:13px" onclick="sendChat()">שלח</button>
  </div>
  <div class="vote-grid" id="vote-grid"></div>
  <button class="btn btn-gold" style="max-width:280px" id="btn-resolve" onclick="resolveVote()">📊 סיים הצבעה</button>
</div>

<!-- =================== RESULT =================== -->
<div id="s-result" class="screen">
  <span class="res-icon" id="res-icon"></span>
  <h1 id="res-title" style="font-size:40px"></h1>
  <p id="res-desc" style="color:var(--muted);max-width:380px;line-height:1.8;text-align:center;"></p>
  <button class="btn btn-purple" style="max-width:240px;margin-top:12px" onclick="goLanding()">🔄 משחק חדש</button>
</div>

<!-- TASK OVERLAY -->
<div class="overlay" id="ov-task">
  <div class="ov">
    <h2 id="ov-th"></h2>
    <div style="font-size:48px;margin:10px 0" id="ov-ti"></div>
    <p style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:18px" id="ov-td"></p>
    <button class="btn btn-gold" onclick="completeTask()">✓ השלם משימה</button>
    <br><br>
    <button class="btn btn-gray" onclick="closeOv('ov-task')">ביטול</button>
  </div>
</div>

<!-- KILL OVERLAY -->
<div class="overlay" id="ov-kill">
  <div class="ov">
    <h2 style="color:var(--blood)">💀 חסל שחקן?</h2>
    <div style="font-size:48px;margin:10px 0" id="ov-kav"></div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">עומד לחסל את <strong id="ov-knm"></strong></p>
    <button class="btn btn-red" onclick="confirmKill()">חסל!</button>
    <br><br>
    <button class="btn btn-gray" onclick="closeOv('ov-kill')">ביטול</button>
  </div>
</div>

<!-- FIREBASE SDK -->

// ============================================================

const COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];

// ============================================================

// ============================================================
function initFB(){

  try{
    if(!firebase.apps.length) firebase.initializeApp(FB);
    db=firebase.database();
    return true;
  }catch(e){
    document.getElementById('fb-err').style.display='block';
    return false;
  }
}

// ============================================================
// LANDING UI
// ============================================================
function buildColorRow(){
  document.getElementById('color-row').innerHTML=
    COLORS.map((c,i)=>`<div class="cdot${i===myColor?' sel':''}" style="background:${c}" onclick="pickColor(${i})"></div>`).join('');
}
function pickColor(i){ myColor=i; buildColorRow(); }

function buildAvatarRow(){
  const avs=myGender==='male'?AV_M:AV_F;
  document.getElementById('avatar-row').innerHTML=
    avs.map((a,i)=>`<div class="avbtn${i===myAvIdx?' sel':''}" onclick="pickAv(${i})">${a}</div>`).join('');
}
function pickAv(i){ myAvIdx=i; buildAvatarRow(); }

function setGender(g){
  myGender=g; myAvIdx=0;
  document.getElementById('gbtn-male').classList.toggle('sel',g==='male');
  document.getElementById('gbtn-female').classList.toggle('sel',g==='female');
  buildAvatarRow();
}

function getAvatar(){
  const avs=myGender==='male'?AV_M:AV_F;
  return avs[myAvIdx]||avs[0];
}

// ============================================================
// ROOM CREATE / JOIN
// ============================================================
async function createRoom(){
  if(!initFB()) return;
  myName=document.getElementById('inp-name').value.trim()||'שחקן';
  roomCode=String(Math.floor(100000+Math.random()*900000));
  isHost=true;
  const me={id:myId,name:myName,color:myColor,avatar:getAvatar(),alive:true,pos:STARTS[0],isGhost:false,tasksDone:0};
  await db.ref('rooms/'+roomCode).set({
    host:myId,phase:'lobby',
    players:{[myId]:me},
    tasks:{},bodies:{},log:{},chat:{},votes:{},
    doneTasks:0,totalTasks:0,turn:myId,timer:90
  });
  go('s-lobby');
  document.getElementById('lob-code').textContent=roomCode;
  document.getElementById('btn-start').style.display='block';
  listenRoom();
}

async function joinRoom(){
  if(!initFB()) return;
  myName=document.getElementById('inp-name').value.trim()||'שחקן';
  const code=document.getElementById('inp-code').value.trim();
  if(code.length!==6){alert('קוד לא תקין — 6 ספרות');return;}
  const snap=await db.ref('rooms/'+code).get();
  if(!snap.exists()){alert('חדר לא נמצא!');return;}
  const room=snap.val();
  if(room.phase!=='lobby'){alert('המשחק כבר התחיל!');return;}
  roomCode=code; isHost=false;
  const idx=Object.keys(room.players||{}).length;
  const usedColors=Object.values(room.players||{}).map(p=>p.color);
  let col=myColor;
  if(usedColors.includes(col)){for(let i=0;i<8;i++){if(!usedColors.includes(i)){col=i;break;}}}
  myColor=col;
  const me={id:myId,name:myName,color:myColor,avatar:getAvatar(),alive:true,pos:STARTS[idx%8],isGhost:false,tasksDone:0};
  await db.ref('rooms/'+roomCode+'/players/'+myId).set(me);
  go('s-lobby');
  document.getElementById('lob-code').textContent=roomCode;
  listenRoom();
}

function leaveRoom(){
  stopListener();
  clearInterval(timerInt);
  if(roomCode) db.ref('rooms/'+roomCode+'/players/'+myId).remove();
  goLanding();
}

// ============================================================
// FIREBASE LISTENER
// ============================================================
function listenRoom(){
  stopListener();
  roomListener=db.ref('rooms/'+roomCode).on('value',snap=>{
    if(!snap||!snap.exists()) return;
    gs=snap.val();
    onState(gs);
  });
}
function stopListener(){
  if(roomListener&&roomCode){
    db.ref('rooms/'+roomCode).off('value',roomListener);
    roomListener=null;
  }
}

function onState(s){
  if(!s) return;
  if(s.phase==='lobby')     renderLobby(s);
  else if(s.phase==='role') showRole(s);
  else if(s.phase==='game') onGame(s);
  else if(s.phase==='vote') onVote(s);
  else if(s.phase==='result') onResult(s);
}

// ============================================================
// LOBBY
// ============================================================
function renderLobby(s){
  if(curScreen()!=='s-lobby') return;
  const players=Object.values(s.players||{});
  document.getElementById('lob-players').innerHTML=players.map(p=>`
    <div class="player-row">
      <span style="font-size:26px">${p.avatar||'🧑'}</span>
      <span style="flex:1;font-weight:700;color:${COLORS[p.color]}">${p.name}${p.id===myId?' (אני)':''}</span>
      <span class="badge ${p.id===s.host?'badge-host':'badge-ready'}">${p.id===s.host?'מארח':'מוכן'}</span>
    </div>
  `).join('');
  const n=players.length;
  document.getElementById('lob-status').innerHTML=
    n>=2?`${n} שחקנים מחוברים ✓`:`<span class="spin"></span>ממתין לשחקנים נוספים...`;
  if(isHost) document.getElementById('btn-start').style.display=n>=2?'block':'none';
}

// ============================================================
// HOST START
// ============================================================
async function hostStart(){
  if(!isHost||!gs) return;
  const players=Object.values(gs.players||{});
  if(players.length<2){alert('צריך לפחות 2 שחקנים');return;}
  const ghostIdx=Math.floor(Math.random()*players.length);
  const up={};
  players.forEach((p,i)=>{
    up['players/'+p.id+'/isGhost']=(i===ghostIdx);
    up['players/'+p.id+'/pos']=STARTS[i%8];
    up['players/'+p.id+'/alive']=true;
    up['players/'+p.id+'/tasksDone']=0;
  });
  const taskTiles=[];
  MAP.forEach((row,r)=>row.forEach((c,cc)=>{if(c==='T')taskTiles.push({r,c:cc});}));
  const shuffled=[...TASKS].sort(()=>Math.random()-.5);
  const tasks={};
  taskTiles.forEach((pos,i)=>{
    tasks['t'+i]={r:pos.r,c:pos.c,defIdx:i%shuffled.length,done:false,id:'t'+i};
  });
  up.tasks=tasks;
  up.bodies={};up.log={};up.chat={};up.votes={};
  up.doneTasks=0;up.totalTasks=taskTiles.length;
  up.turn=players[0].id;up.timer=90;
  up.phase='role';
  await db.ref('rooms/'+roomCode).update(up);
}

// ============================================================
// ROLE REVEAL
// ============================================================
function showRole(s){
  if(curScreen()==='s-role') return;
  const me=s.players&&s.players[myId];
  if(!me) return;
  if(me.isGhost){
    document.getElementById('r-icon').textContent='👻';
    document.getElementById('r-title').innerHTML='<span class="role-ghost">אתה הרוח!</span>';
    document.getElementById('r-desc').textContent='חסל שחקנים מבלי להיתפס. שקר, התחמק, הישאר חף מפשע. תנצח כשנשארים 2 שחקנים.';
  } else {
    document.getElementById('r-icon').textContent='🕵️';
    document.getElementById('r-title').innerHTML='<span class="role-human">אתה חוקר</span>';
    document.getElementById('r-desc').textContent='השלם משימות ועקוב אחר חשודים. דווח על גופות לזמן הצבעה. תנצח כשכל המשימות הושלמו או שהרוח מזוהה.';
  }
  go('s-role');
}

async function goGame(){
  await db.ref('rooms/'+roomCode+'/phase').set('game');
  go('s-game');
  startTimer();
}

// ============================================================
// GAME
// ============================================================
function onGame(s){
  if(curScreen()==='s-lobby'||curScreen()==='s-role'||curScreen()==='s-landing'){
    go('s-game');
    startTimer();
  }
  if(curScreen()==='s-game') renderGame(s);
  if(isHost) checkWin(s);
}

function renderGame(s){
  if(!s||!s.players||!s.players[myId]) return;
  const me=s.players[myId];
  const isMyTurn=s.turn===myId;
  const tp=s.players[s.turn];
  document.getElementById('turn-lbl').textContent=isMyTurn?'🔥 התור שלך!':'תור: '+(tp?tp.name:'?');
  document.getElementById('turn-lbl').style.color=isMyTurn?'var(--gold2)':'var(--ghost2)';
  document.getElementById('timer-el').textContent=s.timer||90;
  renderMap(s);
  renderSidebar(s);
  renderActions(s);
}

function renderMap(s){
  const grid=document.getElementById('map-grid');
  const cols=MAP[0].length;
  grid.style.gridTemplateColumns='repeat('+cols+',64px)';
  grid.innerHTML='';
  const me=s.players[myId];
  const tasks=Object.values(s.tasks||{});
  const bodies=Object.values(s.bodies||{});
  const players=Object.values(s.players||{});
  MAP.forEach((row,r)=>{
    row.forEach((cell,c)=>{
      const d=document.createElement('div');
      d.className='tile';
      if(cell===0){d.classList.add('wall');grid.appendChild(d);return;}
      cell===1?d.classList.add('corr'):d.classList.add('room');
      const key=r+','+c;
      const body=bodies.find(b=>b.r===r&&b.c===c);
      const task=tasks.find(t=>t.r===r&&t.c===c);
      const here=players.filter(p=>p.alive&&p.pos&&p.pos.r===r&&p.pos.c===c);
      const isMeHere=me&&me.pos&&me.pos.r===r&&me.pos.c===c;
      if(task&&!task.done) d.classList.add('t-task');
      if(body) d.classList.add('t-body');
      if(isMeHere) d.classList.add('t-me');
      let inner='';
      if(body){
        inner='<div class="tile-em">💀</div><div class="tile-lb">'+(body.pname||'').substring(0,8)+'</div>';
      } else if(here.length>0){
        const avs=here.map(p=>'<span style="font-size:'+(here.length>2?'13':'18')+'px">'+(p.avatar||'🧑')+'</span>').join('');
        inner='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:1px">'+avs+'</div>';
        if(isMeHere) inner+='<div style="font-size:7px;color:var(--ghost2);font-weight:700">אני</div>';
      } else if(task){
        inner='<div class="tile-em">'+(task.done?'✅':TASKS[task.defIdx].icon)+'</div><div class="tile-lb">'+TASKS[task.defIdx].name.substring(0,8)+'</div>';
      } else if(cell==='R'){
        inner='<div class="tile-em">'+(RICONS[key]||'🚪')+'</div><div class="tile-lb">'+(RNAMES[key]||'').substring(0,8)+'</div>';
      }
      d.innerHTML=inner;
      if(cell!==0) d.onclick=()=>moveTo(r,c);
      grid.appendChild(d);
    });
  });
}

function renderSidebar(s){
  const players=Object.values(s.players||{});
  document.getElementById('pl-list').innerHTML=players.map(p=>
    '<div class="mp"><div class="mdot" style="background:'+COLORS[p.color]+'"></div>'
    +'<div class="mname" style="'+(p.alive?'':'text-decoration:line-through;opacity:.4')+'">'+p.name+(p.id===myId?' (אני)':'')+'</div>'
    +(p.alive?'':'<span style="font-size:10px;color:var(--blood)">☠</span>')+'</div>'
  ).join('');
  const tasks=Object.values(s.tasks||{});
  document.getElementById('task-list').innerHTML=tasks.map(t=>
    '<div class="tr"><div class="tck'+(t.done?' done':'')+'">'+( t.done?'✓':'')+'</div>'
    +'<span style="'+(t.done?'opacity:.4':'')+'">'+TASKS[t.defIdx].icon+' '+TASKS[t.defIdx].name.substring(0,14)+'</span></div>'
  ).join('');
  const pct=Math.round((s.doneTasks||0)/Math.max(s.totalTasks||1,1)*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('t-pct').textContent=pct+'%';
  const log=Object.values(s.log||{}).sort((a,b)=>b.ts-a.ts);
  document.getElementById('ev-log').innerHTML=log.slice(0,10).map(e=>
    '<div class="log-item '+(e.t||'')+'">'+e.m+'</div>').join('');
}

function renderActions(s){
  const me=s.players[myId];
  const area=document.getElementById('actions');
  if(!me){area.innerHTML='';return;}
  if(s.turn!==myId){area.innerHTML='<div class="a-wait">⏳ ממתין לתור שלך...</div>';return;}
  if(!me.alive){area.innerHTML='<div class="a-wait">☠ אתה מת — צופה בלבד</div>';return;}
  const pos=me.pos;
  const tasks=Object.values(s.tasks||{});
  const bodies=Object.values(s.bodies||{});
  const players=Object.values(s.players||{});
  const taskHere=tasks.find(t=>t.r===pos.r&&t.c===pos.c&&!t.done);
  const bodyHere=bodies.find(b=>b.r===pos.r&&b.c===pos.c);
  const nearby=players.filter(p=>p.id!==myId&&p.alive&&p.pos&&Math.abs(p.pos.r-pos.r)<=1&&Math.abs(p.pos.c-pos.c)<=1);
  let h='';
  if(taskHere) h+='<button class="act a-task" onclick="openTask(\''+taskHere.id+'\','+taskHere.defIdx+')">⚙ משימה</button>';
  if(bodyHere) h+='<button class="act a-report" onclick="doReport()">🚨 דווח גופה</button>';
  if(me.isGhost&&nearby.length) h+='<button class="act a-kill" onclick="pickKill()">💀 חסל!</button>';
  h+='<button class="act a-pass" onclick="endTurn()">➡ סיים תור</button>';
  area.innerHTML=h;
}

// ============================================================
// MOVE
// ============================================================
async function moveTo(r,c){
  if(!gs||!gs.players) return;
  if(gs.turn!==myId) return;
  const me=gs.players[myId];
  if(!me||!me.alive) return;
  if(Math.abs(me.pos.r-r)>1||Math.abs(me.pos.c-c)>1){addLog('⚠ משבצת רחוקה מדי');return;}
  if(MAP[r][c]===0) return;
  await db.ref('rooms/'+roomCode+'/players/'+myId+'/pos').set({r,c});
  addLog('🚶 '+me.name+' עבר ל'+(RNAMES[r+','+c]||'מסדרון'));
}

// ============================================================
// TASK
// ============================================================
function openTask(id,defIdx){
  activeTaskId=id;
  document.getElementById('ov-th').textContent=TASKS[defIdx].name;
  document.getElementById('ov-ti').textContent=TASKS[defIdx].icon;
  document.getElementById('ov-td').textContent=TASKS[defIdx].desc;
  openOv('ov-task');
}
async function completeTask(){
  closeOv('ov-task');
  if(!gs||!activeTaskId) return;
  const task=gs.tasks[activeTaskId];
  if(!task) return;
  const me=gs.players[myId];
  await db.ref('rooms/'+roomCode+'/tasks/'+activeTaskId+'/done').set(true);
  await db.ref('rooms/'+roomCode+'/doneTasks').set((gs.doneTasks||0)+1);
  addLog('✅ '+me.name+' השלים: '+TASKS[task.defIdx].name,'lt');
}

// ============================================================
// KILL
// ============================================================
function pickKill(){
  if(!gs) return;
  const me=gs.players[myId];
  const nearby=Object.values(gs.players).filter(p=>p.id!==myId&&p.alive&&p.pos&&Math.abs(p.pos.r-me.pos.r)<=1&&Math.abs(p.pos.c-me.pos.c)<=1);
  if(!nearby.length) return;
  killTarget=nearby[0];
  document.getElementById('ov-kav').textContent=killTarget.avatar||'🧑';
  document.getElementById('ov-knm').textContent=killTarget.name;
  openOv('ov-kill');
}
async function confirmKill(){
  closeOv('ov-kill');
  if(!killTarget) return;
  await db.ref('rooms/'+roomCode+'/players/'+killTarget.id+'/alive').set(false);
  await db.ref('rooms/'+roomCode+'/bodies/b'+Date.now()).set({r:killTarget.pos.r,c:killTarget.pos.c,pname:killTarget.name});
  addLog('💀 '+killTarget.name+' חוסל!','lk');
  killTarget=null;
}

// ============================================================
// REPORT
// ============================================================
async function doReport(){
  clearInterval(timerInt);
  const me=gs.players[myId];
  const key='c'+Date.now();
  await db.ref('rooms/'+roomCode+'/chat/'+key).set({name:'מערכת',msg:me.name+' דיווח על גופה! מי הרוח?',color:'#e74c3c',ts:Date.now()});
  await db.ref('rooms/'+roomCode).update({phase:'vote',votes:{}});
}

// ============================================================
// VOTE
// ============================================================
function onVote(s){
  if(curScreen()!=='s-vote') go('s-vote');
  renderVote(s);
}
function renderVote(s){
  const chat=Object.values(s.chat||{}).sort((a,b)=>a.ts-b.ts);
  const cb=document.getElementById('chat-box');
  cb.innerHTML=chat.map(m=>'<div class="chat-m"><span style="font-weight:700;color:'+(m.color||'var(--ghost2)')+'">'+m.name+': </span>'+m.msg+'</div>').join('');
  cb.scrollTop=cb.scrollHeight;
  const votes=s.votes||{};
  const myVote=votes[myId];
  const alive=Object.values(s.players||{}).filter(p=>p.alive);
  document.getElementById('vote-grid').innerHTML=
    alive.map(p=>'<div class="vc'+(myVote===p.id?' myv':'')+'" onclick="castVote(\''+p.id+'\')">'
      +'<div class="vc-av">'+(p.avatar||'🧑')+'</div>'
      +'<div class="vc-nm" style="color:'+COLORS[p.color]+'">'+p.name+(p.id===myId?' (אני)':'')+'</div>'
      +'<div class="vc-ct">'+Object.values(votes).filter(v=>v===p.id).length+' קולות</div></div>'
    ).join('')
    +'<div class="vc" onclick="castVote(\'skip\')"><div class="vc-av">⏭</div><div class="vc-nm" style="color:var(--muted)">דלג</div></div>';
  document.getElementById('btn-resolve').style.display=isHost?'block':'none';
}
async function castVote(tid){ await db.ref('rooms/'+roomCode+'/votes/'+myId).set(tid); }
async function sendChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim(); if(!msg) return;
  const me=gs.players[myId];
  await db.ref('rooms/'+roomCode+'/chat/c'+Date.now()+'_'+Math.random().toString(36).slice(2,5)).set({name:me.name,msg,color:COLORS[me.color],ts:Date.now()});
  inp.value='';
}
async function resolveVote(){
  if(!isHost||!gs) return;
  const votes=gs.votes||{};
  const tally={};
  Object.values(votes).forEach(v=>{if(v!=='skip')tally[v]=(tally[v]||0)+1;});
  const sorted=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  if(sorted.length){
    const ejId=sorted[0][0];
    const ej=gs.players[ejId];
    if(ej){
      await db.ref('rooms/'+roomCode+'/players/'+ejId+'/alive').set(false);
      addLog('🗳 '+ej.name+' הוצא בהצבעה','lv');
      if(ej.isGhost){await doResult('humans');return;}
    }
  } else { addLog('🗳 לא הוצבע על אף אחד','lv'); }
  checkWin(gs);
  const next=nextTurn(gs.turn);
  await db.ref('rooms/'+roomCode).update({phase:'game',turn:next,timer:90,votes:{},chat:{}});
}

// ============================================================
// TIMER
// ============================================================
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(async()=>{
    if(!gs||gs.phase!=='game') return;
    const t=Math.max((gs.timer||1)-1,0);
    const el=document.getElementById('timer-el');
    if(el) el.textContent=t;
    if(isHost){
      await db.ref('rooms/'+roomCode+'/timer').set(t);
      if(t<=0){ addLog('⏰ הזמן נגמר — עובר לתור הבא'); await endTurn(); }
    }
  },1000);
}
async function endTurn(){
  clearInterval(timerInt);
  const next=nextTurn(gs?gs.turn:myId);
  await db.ref('rooms/'+roomCode).update({turn:next,timer:90});
  startTimer();
}
function nextTurn(curId){
  if(!gs||!gs.players) return curId;
  const alive=Object.values(gs.players).filter(p=>p.alive);
  const idx=alive.findIndex(p=>p.id===curId);
  return alive[(idx+1)%alive.length]?.id||alive[0]?.id||curId;
}

// ============================================================
// WIN
// ============================================================
async function checkWin(s){
  if(!isHost||!s||s.phase==='vote'||s.phase==='result') return;
  const alive=Object.values(s.players||{}).filter(p=>p.alive);
  const ghost=alive.find(p=>p.isGhost);
  const humans=alive.filter(p=>!p.isGhost);
  if(!ghost){await doResult('humans');return;}
  if(humans.length<=1){await doResult('ghost');return;}
  if((s.doneTasks||0)>=(s.totalTasks||1)&&(s.totalTasks||0)>0){await doResult('humans');return;}
}
async function doResult(winner){
  clearInterval(timerInt);
  await db.ref('rooms/'+roomCode).update({phase:'result',winner});
}
function onResult(s){
  if(curScreen()==='s-result') return;
  const ghost=Object.values(s.players||{}).find(p=>p.isGhost);
  if(s.winner==='humans'){
    document.getElementById('res-icon').textContent='🎉';
    document.getElementById('res-title').textContent='האנשים ניצחו!';
    document.getElementById('res-title').style.color='var(--ghost2)';
    document.getElementById('res-desc').textContent='הרוח הייתה '+(ghost?.name||'?')+'. כל הכבוד לקבוצה!';
  } else {
    document.getElementById('res-icon').textContent='👻';
    document.getElementById('res-title').textContent='הרוח ניצחה!';
    document.getElementById('res-title').style.color='var(--blood)';
    document.getElementById('res-desc').textContent=(ghost?.name||'?')+' הייתה הרוח וחיסלה את כולם. הבית נשאר ארור לנצח...';
  }
  go('s-result');
}

// ============================================================
// LOG
// ============================================================
async function addLog(m,t=''){
  if(!db||!roomCode) return;
  await db.ref('rooms/'+roomCode+'/log/l'+Date.now()+'_'+Math.random().toString(36).slice(2,5)).set({m,t,ts:Date.now()});
}

// ============================================================
// UTILS
// ============================================================
function go(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('on');s.style.display='';});
  const el=document.getElementById(id);
  if(!el){console.error('screen not found:',id);return;}
  el.style.display='flex';
  el.classList.add('on');
}
function curScreen(){
  const el=document.querySelector('.screen.on');
  return el?el.id:'';
}
function openOv(id){ const el=document.getElementById(id); if(el) el.classList.add('on'); }
function closeOv(id){ const el=document.getElementById(id); if(el) el.classList.remove('on'); }
function goLanding(){
  stopListener(); clearInterval(timerInt);
  gs=null; roomCode=null; isHost=false;
  go('s-landing');
}

// ============================================================
// BOOT
// ============================================================
buildColorRow();
buildAvatarRow();
</script>
