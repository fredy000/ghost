<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>הבית הארור 👻</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Heebo:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0812;color:#e8e0f8;font-family:'Heebo',sans-serif;overflow:hidden;touch-action:none;}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;}
.screen.on{display:flex;}

/* LANDING */
#s-land{background:radial-gradient(ellipse at 50% 30%,#1a0a3e,#0a0812 70%);}
.px{font-family:'Press Start 2P',monospace;}
.title{font-family:'Press Start 2P',monospace;font-size:24px;color:#a78bfa;text-shadow:0 0 20px #6c3aed,0 4px 0 #3a0a8a;text-align:center;margin-bottom:6px;}
.sub{font-family:'Press Start 2P',monospace;font-size:9px;color:#7c6f9f;text-align:center;margin-bottom:24px;}
.card{background:rgba(17,15,30,.96);border:2px solid #6c3aed;border-radius:4px;padding:24px 28px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;box-shadow:0 0 40px rgba(108,58,237,.3);}
.lbl{font-size:11px;color:#7c6f9f;letter-spacing:1px;margin-bottom:3px;}
.inp{width:100%;background:#110f1e;border:1px solid #3a3355;color:#e8e0f8;border-radius:3px;padding:9px 12px;font-family:'Heebo',sans-serif;font-size:14px;outline:none;}
.inp:focus{border-color:#a78bfa;}
.grow{display:flex;gap:8px;}
.gbtn{flex:1;padding:9px;border-radius:3px;border:2px solid #3a3355;background:#110f1e;color:#7c6f9f;font-family:'Heebo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.gbtn.on{border-color:#a78bfa;background:rgba(108,58,237,.2);color:#a78bfa;}
.avrow{display:flex;gap:5px;flex-wrap:wrap;}
.av{width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;border:2px solid #3a3355;background:#110f1e;}
.av.on{border-color:#fff;background:#252040;}
.crow{display:flex;gap:5px;flex-wrap:wrap;}
.cd{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.cd.on{border-color:#fff;}
.hr{height:1px;background:#3a3355;}
.btn{border:none;border-radius:3px;padding:11px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.bp{background:#6c3aed;color:#fff;}
.bg{background:#1a1730;color:#e8e0f8;border:1px solid #3a3355;}
.br{background:#c0392b;color:#fff;}
.bgo{background:#d97706;color:#111;}
.btn:hover{filter:brightness(1.15);}

/* LOBBY */
#s-lobby{background:#0a0812;}
.lbox{background:#110f1e;border:2px solid #6c3aed;border-radius:4px;padding:22px;max-width:460px;width:100%;}
.rcode{font-family:'Press Start 2P',monospace;font-size:20px;color:#a78bfa;letter-spacing:8px;text-align:center;padding:12px;background:#0a0812;border-radius:3px;margin-bottom:12px;border:1px solid #6c3aed;}
.pc{display:flex;align-items:center;gap:9px;background:#0a0812;border-radius:3px;padding:9px 12px;margin-bottom:7px;border:1px solid #252040;}
.bdg{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;}
.bh{background:#d97706;color:#111;}.br2{background:#059669;color:#fff;}
.spin{display:inline-block;width:10px;height:10px;border:2px solid #3a3355;border-top-color:#a78bfa;border-radius:50%;animation:sp .7s linear infinite;margin-left:5px;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ROLE */
#s-role{background:#0a0812;}
.rbox{background:#110f1e;border:3px solid #6c3aed;border-radius:4px;padding:28px 36px;text-align:center;max-width:380px;}
.ri{font-size:72px;margin-bottom:8px;}
.rt{font-family:'Press Start 2P',monospace;font-size:18px;line-height:1.7;margin-bottom:10px;}
.rg{color:#c0392b;}.rh{color:#a78bfa;}
.rd{color:#7c6f9f;font-size:13px;line-height:1.8;}

/* GAME */
#s-game{background:#000;}
canvas{display:block;}
.hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;background:rgba(10,8,18,.92);border-bottom:2px solid #6c3aed;padding:5px 10px;z-index:20;}
.hud-title{font-family:'Press Start 2P',monospace;font-size:10px;color:#a78bfa;}
.hud-tasks{font-family:'Press Start 2P',monospace;font-size:9px;color:#fbbf24;flex:1;text-align:center;}
.hud-timer{font-family:'Press Start 2P',monospace;font-size:13px;color:#c0392b;min-width:34px;text-align:right;}

/* action bar */
.abar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:5px;padding:6px;background:rgba(10,8,18,.92);border-top:2px solid #6c3aed;z-index:20;}
.abtn{flex:1;padding:7px 4px;border-radius:3px;border:none;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:7px;line-height:1.6;transition:filter .1s;}
.abtn:hover{filter:brightness(1.2);}
.at{background:#d97706;color:#111;}
.ak{background:#c0392b;color:#fff;}
@keyframes kpulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.9)}50%{box-shadow:0 0 0 8px rgba(192,57,43,0)}}
.ak{animation:kpulse 0.8s infinite;}
.ar{background:#252040;color:#e8e0f8;}
.ae{background:#1a1730;color:#7c6f9f;border:1px solid #3a3355;}

/* dpad */
.dpad{position:fixed;bottom:80px;left:10px;display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:3px;z-index:20;}
.dp{width:44px;height:44px;border-radius:5px;background:rgba(108,58,237,.3);border:2px solid rgba(167,139,250,.4);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.dp:active{background:rgba(108,58,237,.7);}
.dp-blank{background:transparent;border:none;}

/* VOTE */
#s-vote{background:#0a0812;justify-content:flex-start;padding-top:16px;overflow-y:auto;gap:10px;}
.vtitle{font-family:'Press Start 2P',monospace;font-size:14px;color:#a78bfa;text-align:center;}
.cbox{width:100%;max-width:540px;background:#110f1e;border:1px solid #3a3355;border-radius:3px;padding:10px;max-height:110px;overflow-y:auto;}
.cm{font-size:12px;line-height:1.7;border-bottom:1px solid #252040;padding:2px 0;}
.cm:last-child{border:none;}
.crow2{display:flex;gap:6px;width:100%;max-width:540px;}
.crow2 .inp{flex:1;}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;width:100%;max-width:540px;}
.vc{background:#110f1e;border:2px solid #252040;border-radius:3px;padding:9px;text-align:center;cursor:pointer;}
.vc:hover{border-color:#a78bfa;}
.vc.myv{border-color:#c0392b;}
.vca{font-size:26px;}.vcn{font-size:11px;font-weight:700;margin-top:3px;}.vcc{font-size:10px;color:#7c6f9f;margin-top:2px;}

/* RESULT */
#s-result{background:radial-gradient(ellipse at 50% 30%,#1a0a3e,#0a0812 70%);}
.resico{font-size:80px;animation:flt 2s ease-in-out infinite;text-align:center;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.restitle{font-family:'Press Start 2P',monospace;font-size:18px;text-align:center;line-height:1.7;margin:14px 0 8px;}
.resdesc{color:#7c6f9f;max-width:360px;line-height:1.8;text-align:center;font-size:13px;}

/* OVERLAYS */
.ow{position:fixed;inset:0;background:rgba(8,6,20,.93);display:none;align-items:center;justify-content:center;z-index:100;}
.ow.on{display:flex;}
.ob{background:#110f1e;border:2px solid #6c3aed;border-radius:4px;padding:24px 28px;max-width:300px;width:100%;text-align:center;}
.ob h2{font-family:'Press Start 2P',monospace;font-size:12px;color:#a78bfa;margin-bottom:10px;line-height:1.7;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#110f1e;}
::-webkit-scrollbar-thumb{background:#6c3aed;border-radius:2px;}
</style>
</head>

<!-- LANDING -->
<div id="s-land" class="screen on">
  <div style="font-size:52px;animation:flt 3s ease-in-out infinite;text-align:center;margin-bottom:4px">👻</div>

      </div>

    <div><div class="lbl">צבע</div><div class="crow" id="crow"></div></div>
    <div class="hr"></div>
    <button class="btn bp" onclick="createRoom()">✨ צור חדר חדש</button>
    <div style="text-align:center;font-size:11px;color:#3a3355">— או —</div>
    <div><div class="lbl">קוד חדר</div><input class="inp" id="inp-code" placeholder="XXXXXX" maxlength="6" style="letter-spacing:6px;text-align:center;font-size:18px;font-family:monospace"></div>
    <button class="btn bg" onclick="joinRoom()">🚪 הצטרף</button>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <div class="px" style="font-size:13px;color:#a78bfa;margin-bottom:14px">LOBBY</div>

      <button class="btn bg" onclick="leaveRoom()">← צא</button>
    </div>
  </div>
</div>

<!-- ROLE -->
<div id="s-role" class="screen">
  <div class="rbox">
    <div class="ri" id="r-ico"></div>
    <div class="rt" id="r-ttl"></div>
    <div class="rd" id="r-dsc"></div>
  </div>
  <button class="btn bp" style="max-width:240px;margin-top:14px" onclick="enterGame()">משחקים! 🎮</button>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="hud">
    <div class="hud-title">👁 הבית הארור</div>
    <div class="hud-tasks" id="hud-tasks">משימות: 0/0</div>
    <div class="hud-timer" id="hud-timer"></div>
  </div>
  <canvas id="gc"></canvas>
  <div class="abar" id="abar"></div>
  <!-- D-PAD for mobile -->
  <div class="dpad" id="dpad">
    <div class="dp dp-blank"></div>
    <div class="dp" onpointerdown="dpadDir(0,-1)" onpointerup="dpadStop()">▲</div>
    <div class="dp dp-blank"></div>
    <div class="dp" onpointerdown="dpadDir(-1,0)" onpointerup="dpadStop()">◀</div>
    <div class="dp dp-blank"></div>
    <div class="dp" onpointerdown="dpadDir(1,0)" onpointerup="dpadStop()">▶</div>
    <div class="dp dp-blank"></div>
    <div class="dp" onpointerdown="dpadDir(0,1)" onpointerup="dpadStop()">▼</div>
    <div class="dp dp-blank"></div>
  </div>
</div>

<!-- VOTE -->
<div id="s-vote" class="screen">
  <div class="vtitle">🗳 ישיבת חירום!</div>
  <div class="cbox" id="cbox"></div>
  <div class="crow2">
    <input class="inp" id="chat-in" placeholder="הגד דעתך..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn bp" style="width:auto;padding:9px 12px;font-size:13px" onclick="sendChat()">שלח</button>
  </div>
  <div class="vgrid" id="vgrid"></div>
  <button class="btn bgo" style="max-width:240px" id="btn-res" onclick="resolveVote()">📊 סיים הצבעה</button>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="resico" id="res-ico"></div>
  <div class="restitle" id="res-ttl"></div>
  <div class="resdesc" id="res-dsc"></div>
  <button class="btn bp" style="max-width:200px;margin-top:18px" onclick="goLand()">🔄 שחק שוב</button>
</div>

<!-- TASK OV -->
<div class="ow" id="ov-task">
  <div class="ob">
    <h2 id="ot-h"></h2>
    <div style="font-size:48px;margin:8px 0" id="ot-i"></div>
    <p style="color:#7c6f9f;font-size:12px;line-height:1.7;margin-bottom:14px" id="ot-d"></p>
    <button class="btn bgo" onclick="completeTask()">✓ השלם</button>
    <br><br><button class="btn bg" onclick="cOv('ov-task')">ביטול</button>
  </div>
</div>

<!-- KILL OV -->
<div class="ow" id="ov-kill">
  <div class="ob">
    <h2 style="color:#c0392b">💀 חסל?</h2>
    <div style="font-size:48px;margin:8px 0" id="ok-av"></div>

    <br><br><button class="btn bg" onclick="cOv('ov-kill')">ביטול</button>
  </div>
</div>

<!-- REPORT OV -->
<div class="ow" id="ov-report">

    <h2>🚨 דיווח על גופה</h2>

    <br><br><button class="btn bg" onclick="cOv('ov-report')">ביטול</button>
  </div>
</div>

async function createRoom(){
  if(!initFB())return;
  myName=document.getElementById('inp-name').value.trim()||'שחקן';
  roomCode=String(Math.floor(100000+Math.random()*900000));
  isHost=true;
  const me=mkP(0);
  myX=me.x;myY=me.y;
  await db.ref('rooms/'+roomCode).set({
    host:myId,phase:'lobby',
    players:{[myId]:me},
    tasks:{},bodies:{},chat:{},votes:{},
    doneTasks:0,totalTasks:0,
    gameStartAt:0,voteActive:false
  });
  showLobby();
}
async function joinRoom(){
  if(!initFB())return;
  myName=document.getElementById('inp-name').value.trim()||'שחקן';
  const code=document.getElementById('inp-code').value.trim();
  if(code.length!==6){alert('קוד לא תקין');return;}
  const snap=await db.ref('rooms/'+code).get();
  if(!snap.exists()){alert('חדר לא נמצא!');return;}
  const room=snap.val();
  if(room.phase==='result'){alert('המשחק נגמר כבר');return;}
  roomCode=code;isHost=false;
  const idx=Object.keys(room.players||{}).length;
  const usedC=Object.values(room.players||{}).map(p=>p.color);
  let col=myColor;
  if(usedC.includes(col)){for(let i=0;i<8;i++){if(!usedC.includes(i)){col=i;break;}}}
  myColor=col;
  const me=mkP(idx);
  myX=me.x;myY=me.y;
  await db.ref('rooms/'+roomCode+'/players/'+myId).set(me);
  showLobby();
}
function mkP(idx){
  const s=STARTS[idx%STARTS.length];
  return{id:myId,name:myName,color:myColor,avatar:getAv(),alive:true,x:s.x,y:s.y,isGhost:false,killCooldown:0};
}
function showLobby(){
  go('s-lobby');
  document.getElementById('lob-code').textContent=roomCode;
  if(isHost)document.getElementById('btn-start').style.display='block';
  listenRoom();
}
function leaveRoom(){
  stopListen();
  if(roomCode)db.ref('rooms/'+roomCode+'/players/'+myId).remove();
  goLand();
}

// ================================================================
// LISTENER
// ================================================================
function listenRoom(){
  stopListen();
  rRef=db.ref('rooms/'+roomCode).on('value',snap=>{
    if(!snap||!snap.exists())return;
    gs=snap.val();
    onState(gs);
  });
}
function stopListen(){if(rRef&&roomCode){db.ref('rooms/'+roomCode).off('value',rRef);rRef=null;}}

function onState(s){
  if(!s)return;
  if(s.phase==='lobby')     renderLobby(s);
  else if(s.phase==='role') showRole(s);
  else if(s.phase==='game') onGame(s);
  else if(s.phase==='vote') onVote(s);
  else if(s.phase==='result') onResult(s);
}

async function hostStart(){
  if(!isHost||!gs)return;
  const ps=Object.values(gs.players||{});
  if(ps.length<2){alert('צריך לפחות 2');return;}
  const gi=Math.floor(Math.random()*ps.length);
  const up={};
  ps.forEach((p,i)=>{
    const s=STARTS[i%STARTS.length];
    up['players/'+p.id+'/isGhost']=(i===gi);
    up['players/'+p.id+'/x']=s.x;
    up['players/'+p.id+'/y']=s.y;
    up['players/'+p.id+'/alive']=true;
    up['players/'+p.id+'/killCooldown']=0;
  });
  const shuf=[...TASK_DEFS].sort(()=>Math.random()-.5);
  const tasks={};
  TASK_POS.forEach((t,i)=>{tasks['t'+i]={tx:t.tx,ty:t.ty,defIdx:i%shuf.length,done:false,id:'t'+i};});
  up.tasks=tasks;up.bodies={};up.chat={};up.votes={};
  up.doneTasks=0;up.totalTasks=TASK_POS.length;
  up.gameStartAt=Date.now();up.phase='role';up.voteActive=false;
  await db.ref('rooms/'+roomCode).update(up);
}

// ================================================================
// GAME LOOP
// ================================================================
function startGame(){
  go('s-game');
  canvas=document.getElementById('gc');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  ctx=canvas.getContext('2d');
  window.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault();},{passive:false});
  window.addEventListener('keyup',e=>{keys[e.key]=false;});
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
  lastLoop=performance.now();
  requestAnimationFrame(loop);
}

function loop(ts){
  if(cur()!=='s-game'){requestAnimationFrame(loop);return;}
  const dt=Math.min(ts-lastLoop,50)/1000; // seconds
  lastLoop=ts;
  updateMe(dt,ts);
  updateParticles(dt);
  render(ts);
  requestAnimationFrame(loop);
}

// ================================================================
// MOVEMENT
// ================================================================
function updateMe(dt,ts){
  if(!gs||!gs.players||!gs.players[myId])return;
  const me=gs.players[myId];
  if(!me.alive)return;

  // keyboard
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy=1;
  // dpad
  dx+=dpadVel.x;dy+=dpadVel.y;

  if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}

  const spd=SPEED*dt;
  const nx=myX+dx*spd, ny=myY+dy*spd;

  // collision
  const ok=(x,y)=>{
    const margin=0.25;
    return canWalk(x-margin,y-margin)&&canWalk(x+margin,y-margin)&&canWalk(x-margin,y+margin)&&canWalk(x+margin,y+margin);
  };
  if(ok(nx,myY))myX=nx;
  if(ok(myX,ny))myY=ny;

  // anim
  if(dx!==0||dy!==0){animTimer+=dt;if(animTimer>0.15){animTimer=0;animFrame=(animFrame+1)%4;}}
  else animFrame=0;

  // kill cooldown
  if(killCooldown>0)killCooldown=Math.max(0,killCooldown-dt*1000);

  // push pos to firebase (throttled)
  if(ts-lastPosUpdate>80){
    lastPosUpdate=ts;
    db.ref('rooms/'+roomCode+'/players/'+myId).update({x:myX,y:myY});
  }
}
function canWalk(x,y){
  const r=Math.floor(y),c=Math.floor(x);
  if(r<0||r>=ROWS||c<0||c>=COLS)return false;
  return MAP[r][c]===1;
}

function dpadDir(x,y){dpadVel.x=x;dpadVel.y=y;}
function dpadStop(){dpadVel.x=0;dpadVel.y=0;}

// ================================================================
// PARTICLES
// ================================================================
function updateParticles(dt){
  particles=particles.filter(p=>{
    p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=4*dt;
    return p.life>0;
  });
}
function spawnKillFX(wx,wy){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2,spd=1+Math.random()*3;
    particles.push({x:wx,y:wy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-3,life:0.8+Math.random()*0.5,maxLife:1.3,char:['💀','🩸','👻','💨'][i%4],size:20});
  }
}

// ================================================================
// RENDER
// ================================================================
function render(ts){
  if(!canvas||!ctx)return;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(!gs)return;

  // Camera follows player
  const targetCamX=myX*TS-W/2+TS/2;
  const targetCamY=myY*TS-H/2+TS/2;
  camX+=(targetCamX-camX)*0.12;
  camY+=(targetCamY-camY)*0.12;
  camX=Math.max(0,Math.min(COLS*TS-W,camX));
  camY=Math.max(0,Math.min(ROWS*TS-H,camY));

  ctx.save();
  ctx.translate(-camX,-camY);

  // Visible tile range
  const c0=Math.max(0,Math.floor(camX/TS)-1);
  const c1=Math.min(COLS,Math.ceil((camX+W)/TS)+1);
  const r0=Math.max(0,Math.floor(camY/TS)-1);
  const r1=Math.min(ROWS,Math.ceil((camY+H)/TS)+1);

  // Draw tiles
  for(let r=r0;r<r1;r++){
    for(let c=c0;c<c1;c++){
      const t=MAP[r][c];
      const px=c*TS,py=r*TS;
      if(t===0){
        // Wall
        ctx.fillStyle='#0e0c1c';
        ctx.fillRect(px,py,TS,TS);
        ctx.fillStyle='#18162e';
        ctx.fillRect(px+1,py+1,TS-2,4);
        ctx.fillStyle='#080614';
        ctx.fillRect(px+1,py+TS-4,TS-2,3);
      }else{
        // Floor — color by room
        let fc='#131025';
        const rm=ROOM_INFO.find(rm=>{
          const dx=Math.abs(c-rm.cx),dy=Math.abs(r-rm.cy);
          return dx<=4&&dy<=4;
        });
        if(rm)fc=rm.color;
        ctx.fillStyle=fc;
        ctx.fillRect(px,py,TS,TS);
        // Floor grid
        ctx.strokeStyle='rgba(255,255,255,0.04)';
        ctx.lineWidth=0.5;
        ctx.strokeRect(px,py,TS,TS);
        // Worn pattern
        if((r+c)%3===0){ctx.fillStyle='rgba(0,0,0,0.07)';ctx.fillRect(px+2,py+2,TS-4,TS-4);}
      }
    }
  }

  // Room labels
  ctx.font='bold 11px Heebo';
  ctx.textAlign='center';
  ROOM_INFO.forEach(rm=>{
    ctx.fillStyle='rgba(167,139,250,0.35)';
    ctx.fillText(rm.name,rm.cx*TS+TS/2,(rm.cy-3)*TS);
  });

  // Tasks
  const tasks=Object.values(gs.tasks||{});
  const pulse=0.6+0.4*Math.sin(ts/400);
  tasks.forEach(t=>{
    if(t.done)return;
    const px=t.tx*TS,py=t.ty*TS;
    ctx.save();
    ctx.shadowBlur=14*pulse;ctx.shadowColor='#d97706';
    ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(TASK_DEFS[t.defIdx].icon,px+TS/2,py+TS/2);
    ctx.restore();
    ctx.strokeStyle=`rgba(217,119,6,${0.4+0.4*pulse})`;
    ctx.lineWidth=2;ctx.strokeRect(px+3,py+3,TS-6,TS-6);
  });

  // Bodies
  Object.values(gs.bodies||{}).forEach(b=>{
    const px=b.tx*TS,py=b.ty*TS;
    ctx.fillStyle='rgba(192,57,43,0.25)';ctx.fillRect(px,py+TS*0.6,TS,TS*0.4);
    ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('💀',px+TS/2,py+TS*0.7);
    ctx.font='bold 9px Heebo';ctx.fillStyle='#e74c3c';
    ctx.fillText(b.pname||'',px+TS/2,py+TS-4);
  });

  // Players
  const me=gs.players[myId];
  Object.values(gs.players||{}).forEach(p=>{
    const isMe=p.id===myId;
    const px=(isMe?myX:p.x)*TS, py=(isMe?myY:p.y)*TS;
    if(!p.alive){
      // Dead ghost silhouette
      ctx.globalAlpha=0.25;
      ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('👻',px+TS/2,py+TS/2);
      ctx.globalAlpha=1;return;
    }
    drawPlayer(ctx,px,py,p,isMe,ts);
  });

  // Particles (screen space converted)
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.font=`${p.size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.char,p.x,p.y);
  });
  ctx.globalAlpha=1;

  // Darkness vignette
  if(me&&me.alive){
    const cx=myX*TS+TS/2-camX, cy=myY*TS+TS/2-camY;
    const vr=TS*3.8;
    const grad=ctx.createRadialGradient(cx+camX,cy+camY,vr*0.5,cx+camX,cy+camY,vr*1.3);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(0.55,'rgba(0,0,0,0.1)');
    grad.addColorStop(1,'rgba(0,0,0,0.95)');
    ctx.fillStyle=grad;
    ctx.fillRect(camX,camY,W,H);
  }

  ctx.restore();
  updateHUD(ts);
}

function drawPlayer(ctx,px,py,p,isMe,ts){
  const col=COLORS[p.color];
  const bw=TS*0.52,bh=TS*0.6;
  const bx=px+(TS-bw)/2,by=py+TS*0.22;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.beginPath();ctx.ellipse(px+TS/2,py+TS*0.9,bw*0.4,TS*0.08,0,0,Math.PI*2);ctx.fill();

  // Glow if ghost (visible only to self)
  if(p.isGhost&&isMe){
    ctx.save();ctx.globalAlpha=0.25+0.1*Math.sin(ts/250);
    ctx.fillStyle='rgba(192,57,43,0.6)';
    ctx.beginPath();ctx.roundRect(bx-5,by-bh*0.42,bw+10,bh+bh*0.45,bw*0.4);ctx.fill();
    ctx.restore();
  }

  // Suit body
  ctx.fillStyle=col;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,bw*0.28);ctx.fill();

  // Suit highlight
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath();ctx.roundRect(bx+bw*0.1,by+bh*0.06,bw*0.35,bh*0.32,4);ctx.fill();

  // Backpack
  ctx.fillStyle=darken(col,0.65);
  ctx.beginPath();ctx.roundRect(bx-bw*0.2,by+bh*0.1,bw*0.2,bh*0.5,3);ctx.fill();

  // Helmet
  const hx=bx+bw*0.08,hy=by-bh*0.38,hw=bw*0.84,hh=bh*0.44;
  ctx.fillStyle='rgba(160,210,255,0.82)';
  ctx.beginPath();ctx.roundRect(hx,hy,hw,hh,hw*0.45);ctx.fill();
  ctx.strokeStyle='rgba(100,170,240,0.5)';ctx.lineWidth=1.5;ctx.stroke();

  // Face emoji inside helmet
  ctx.font=`${TS*0.26}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.avatar||'🧑',px+TS/2,hy+hh*0.52);

  // Legs with walk animation
  const lf=animFrame;
  const lOff=isMe?[Math.sin(lf*Math.PI/2)*TS*0.07,-Math.sin(lf*Math.PI/2)*TS*0.07]:[0,0];
  ctx.fillStyle=darken(col,0.75);
  ctx.beginPath();ctx.roundRect(bx+bw*0.12,by+bh*0.88+lOff[0],bw*0.3,bh*0.28,3);ctx.fill();
  ctx.beginPath();ctx.roundRect(bx+bw*0.56,by+bh*0.88+lOff[1],bw*0.3,bh*0.28,3);ctx.fill();

  // Name tag
  const nm=p.name+(isMe?' ★':'');
  ctx.font=`bold 10px Heebo`;
  const nw=ctx.measureText(nm).width+8;
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.fillRect(px+TS/2-nw/2,py-15,nw,13);
  ctx.fillStyle=isMe?'#fbbf24':COLORS[p.color];
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(nm,px+TS/2,py-15);

  // Kill cooldown arc (for ghost)
  if(p.isGhost&&isMe&&killCooldown>0){
    const pct=killCooldown/KILL_CD;
    ctx.strokeStyle='rgba(192,57,43,0.7)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(px+TS/2,py+TS/2,bw*0.6,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-pct));ctx.stroke();
  }
}

function darken(hex,f){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

// ================================================================
// HUD
// ================================================================
function updateHUD(ts){
  if(!gs)return;
  const done=gs.doneTasks||0,total=gs.totalTasks||0;
  document.getElementById('hud-tasks').textContent=`משימות: ${done}/${total}`;

  // Game timer
  const elapsed=gs.gameStartAt?Math.floor((ts-gs.gameStartAt)/1000):0;
  document.getElementById('hud-timer').textContent=Math.floor(elapsed/60)+':'+(elapsed%60<10?'0':'')+elapsed%60;

  // Action bar
  const me=gs.players&&gs.players[myId];
  if(!me||!me.alive){document.getElementById('abar').innerHTML='<div style="flex:1;text-align:center;font-family:\'Press Start 2P\',monospace;font-size:8px;padding:8px;color:#3a3355">☠ צופה בלבד</div>';return;}

  const tasks=Object.values(gs.tasks||{});
  const bodies=Object.values(gs.bodies||{});
  const players=Object.values(gs.players||{});

  const taskHere=tasks.find(t=>!t.done&&Math.hypot(t.tx-myX,t.ty-myY)<1.2);
  const bodyHere=bodies.find(b=>Math.hypot(b.tx-myX,b.ty-myY)<1.2);
  const nearby=players.filter(p=>p.id!==myId&&p.alive&&Math.hypot((p.x||0)-myX,(p.y||0)-myY)<KILL_RANGE);

  let h='';
  if(taskHere) h+=`<button class="abtn at" onclick="openTask('${taskHere.id}',${taskHere.defIdx})">⚙<br>משימה</button>`;
  if(bodyHere) h+=`<button class="abtn ar" onclick="oOv('ov-report')">🚨<br>דווח</button>`;
  if(me.isGhost&&nearby.length&&killCooldown<=0)
    h+=`<button class="abtn ak" onclick="pickKill()">💀<br>חסל!</button>`;
  else if(me.isGhost&&killCooldown>0)
    h+=`<button class="abtn ae" style="min-width:60px">${Math.ceil(killCooldown/1000)}s<br>cooldown</button>`;
  if(!h) h='<div style="flex:1;text-align:center;font-family:\'Press Start 2P\',monospace;font-size:7px;padding:8px;color:#3a3355">WASD / ↑↓←→ להזזה</div>';
  document.getElementById('abar').innerHTML=h;
}

// ================================================================
// KILL
// ================================================================
function pickKill(){
  if(!gs||killCooldown>0)return;
  const players=Object.values(gs.players||{});
  const nearby=players.filter(p=>p.id!==myId&&p.alive&&Math.hypot((p.x||0)-myX,(p.y||0)-myY)<KILL_RANGE);
  if(!nearby.length)return;
  killTarget=nearby[0];
  document.getElementById('ok-av').textContent=killTarget.avatar||'🧑';
  document.getElementById('ok-nm').textContent=killTarget.name;
  oOv('ov-kill');
}
async function confirmKill(){
  cOv('ov-kill');if(!killTarget)return;
  spawnKillFX(killTarget.x*TS,killTarget.y*TS);
  killCooldown=KILL_CD;
  await db.ref('rooms/'+roomCode+'/players/'+killTarget.id+'/alive').set(false);
  await db.ref('rooms/'+roomCode+'/bodies/b'+Date.now()).set({
    tx:Math.round(killTarget.x),ty:Math.round(killTarget.y),pname:killTarget.name
  });
  killTarget=null;
}

// ================================================================
// REPORT
// ================================================================
async function confirmReport(){
  cOv('ov-report');
  const me=gs.players[myId];
  await db.ref('rooms/'+roomCode+'/chat/c'+Date.now()).set({name:'מערכת',msg:me.name+' דיווח על גופה!',color:'#e74c3c',ts:Date.now()});
  await db.ref('rooms/'+roomCode).update({phase:'vote',votes:{}});
}

// ================================================================
// VOTE
// ================================================================
function onVote(s){if(cur()!=='s-vote')go('s-vote');renderVote(s);}
function renderVote(s){
  const chat=Object.values(s.chat||{}).sort((a,b)=>a.ts-b.ts);
  const cb=document.getElementById('cbox');
  cb.innerHTML=chat.map(m=>`<div class="cm"><span style="font-weight:700;color:${m.color||'#a78bfa'}">${m.name}: </span>${m.msg}</div>`).join('');
  cb.scrollTop=cb.scrollHeight;
  const votes=s.votes||{},myVote=votes[myId];
  const alive=Object.values(s.players||{}).filter(p=>p.alive);
  document.getElementById('vgrid').innerHTML=
    alive.map(p=>`<div class="vc${myVote===p.id?' myv':''}" onclick="castVote('${p.id}')">
      <div class="vca">${p.avatar||'🧑'}</div>
      <div class="vcn" style="color:${COLORS[p.color]}">${p.name}${p.id===myId?' (אני)':''}</div>
      <div class="vcc">${Object.values(votes).filter(v=>v===p.id).length} קולות</div></div>`
    ).join('')+'<div class="vc" onclick="castVote(\'skip\')"><div class="vca">⏭</div><div class="vcn" style="color:#7c6f9f">דלג</div></div>';
  document.getElementById('btn-res').style.display=isHost?'block':'none';
}
async function castVote(tid){await db.ref('rooms/'+roomCode+'/votes/'+myId).set(tid);}
async function sendChat(){
  const inp=document.getElementById('chat-in');const msg=inp.value.trim();if(!msg)return;
  const me=gs.players[myId];
  await db.ref('rooms/'+roomCode+'/chat/c'+Date.now()+'x').set({name:me.name,msg,color:COLORS[me.color],ts:Date.now()});
  inp.value='';
}
async function resolveVote(){
  if(!isHost||!gs)return;
  const votes=gs.votes||{};const tally={};
  Object.values(votes).forEach(v=>{if(v!=='skip')tally[v]=(tally[v]||0)+1;});
  const sorted=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  if(sorted.length){
    const ejId=sorted[0][0];const ej=gs.players[ejId];
    if(ej){
      await db.ref('rooms/'+roomCode+'/players/'+ejId+'/alive').set(false);
      if(ej.isGhost){await doResult('humans');return;}
    }
  }
  checkWin(gs);
  await db.ref('rooms/'+roomCode).update({phase:'game',votes:{},chat:{}});
}

// ================================================================
// WIN
// ================================================================
async function checkWin(s){
  if(!isHost||!s||s.phase==='vote'||s.phase==='result')return;
  const alive=Object.values(s.players||{}).filter(p=>p.alive);
  const ghost=alive.find(p=>p.isGhost);
  const humans=alive.filter(p=>!p.isGhost);
  if(!ghost){await doResult('humans');return;}
  if(humans.length<=1){await doResult('ghost');return;}
  if((s.doneTasks||0)>=(s.totalTasks||1)&&(s.totalTasks||0)>0){await doResult('humans');return;}
}
async function doResult(w){await db.ref('rooms/'+roomCode).update({phase:'result',winner:w});}
function onResult(s){
  if(cur()==='s-result')return;
  const ghost=Object.values(s.players||{}).find(p=>p.isGhost);
  if(s.winner==='humans'){
    document.getElementById('res-ico').textContent='🎉';
    document.getElementById('res-ttl').textContent='האנשים ניצחו!';
    document.getElementById('res-ttl').style.color='#a78bfa';
    document.getElementById('res-dsc').textContent='הרוח הייתה '+(ghost?.name||'?')+'. כל הכבוד!';
  }else{
    document.getElementById('res-ico').textContent='👻';
    document.getElementById('res-ttl').textContent='הרוח ניצחה!';
    document.getElementById('res-ttl').style.color='#c0392b';
    document.getElementById('res-dsc').textContent=(ghost?.name||'?')+' הרוח הארורה. הבית שלה לנצח.';
  }
  go('s-result');
}

// ================================================================
// UTILS
// ================================================================
function go(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('on');s.style.display='';});
  const el=document.getElementById(id);if(!el)return;
  el.style.display='flex';el.classList.add('on');
}
function cur(){const el=document.querySelector('.screen.on');return el?el.id:'';}
function oOv(id){const el=document.getElementById(id);if(el)el.classList.add('on');}
function cOv(id){const el=document.getElementById(id);if(el)el.classList.remove('on');}
function goLand(){stopListen();gs=null;roomCode=null;isHost=false;killCooldown=0;keys={};go('s-land');}

// ================================================================
// BOOT
// ================================================================
buildUI();
</script>
</body>
</html>
