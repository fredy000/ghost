<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>הבית הארור 👻</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Heebo:wght@400;700;800&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; }
    body{
      background:#09070f;
      color:#eee7ff;
      font-family:'Heebo',sans-serif;
      overflow:hidden;
      touch-action:none;
    }

    .screen{
      display:none;
      position:fixed;
      inset:0;
      align-items:center;
      justify-content:center;
      flex-direction:column;
    }
    .screen.on{ display:flex; }

    .px{ font-family:'Press Start 2P', monospace; }

    /* LAND */
    #s-land{
      background:radial-gradient(circle at top,#1f1248 0%, #09070f 65%);
      padding:18px;
    }
    .title{
      font-family:'Press Start 2P', monospace;
      font-size:24px;
      color:#b295ff;
      text-align:center;
      line-height:1.6;
      text-shadow:0 0 16px rgba(108,58,237,.8);
      margin-bottom:8px;
    }
    .sub{
      font-family:'Press Start 2P', monospace;
      font-size:9px;
      color:#7e6ca7;
      margin-bottom:20px;
      text-align:center;
    }
    .card{
      width:min(420px,100%);
      background:rgba(17,14,30,.96);
      border:2px solid #6c3aed;
      border-radius:8px;
      padding:20px;
      box-shadow:0 0 40px rgba(108,58,237,.25);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .lbl{
      font-size:11px;
      color:#8d7cb8;
      margin-bottom:4px;
      letter-spacing:.5px;
    }
    .inp{
      width:100%;
      border-radius:6px;
      border:1px solid #3d345f;
      background:#0f0d1b;
      color:#eee7ff;
      padding:10px 12px;
      font-size:14px;
      outline:none;
      font-family:'Heebo',sans-serif;
    }
    .inp:focus{ border-color:#b295ff; }
    .row{ display:flex; gap:8px; }
    .gbtn,.btn{
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-family:'Heebo',sans-serif;
      font-weight:800;
      transition:.15s;
    }
    .gbtn{
      flex:1;
      background:#151325;
      color:#8d7cb8;
      border:2px solid #3d345f;
      padding:10px;
      font-size:14px;
    }
    .gbtn.on{
      background:rgba(108,58,237,.2);
      color:#c9b8ff;
      border-color:#b295ff;
    }
    .btn{
      width:100%;
      padding:11px 12px;
      font-size:14px;
    }
    .bp{ background:#6c3aed; color:#fff; }
    .bp:hover{ filter:brightness(1.08); }
    .bg{ background:#161424; color:#ece4ff; border:1px solid #383255; }
    .bg:hover{ filter:brightness(1.08); }
    .br{ background:#c0392b; color:#fff; }
    .bgo{ background:#d97706; color:#111; }

    .avrow,.crow{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }
    .av{
      width:36px;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#120f1d;
      border:2px solid #3d345f;
      border-radius:6px;
      cursor:pointer;
      font-size:19px;
    }
    .av.on{
      border-color:#fff;
      background:#272142;
    }
    .cd{
      width:22px;
      height:22px;
      border-radius:50%;
      cursor:pointer;
      border:2px solid transparent;
    }
    .cd.on{ border-color:#fff; }

    /* LOBBY */
    #s-lobby{
      background:#09070f;
      padding:16px;
    }
    .lbox{
      width:min(470px,100%);
      background:#110f1e;
      border:2px solid #6c3aed;
      border-radius:8px;
      padding:20px;
    }
    .rcode{
      font-family:'Press Start 2P', monospace;
      font-size:20px;
      letter-spacing:6px;
      text-align:center;
      background:#0c0a15;
      border:1px solid #6c3aed;
      border-radius:6px;
      padding:13px 8px;
      color:#b295ff;
      margin-bottom:12px;
    }
    .pc{
      display:flex;
      align-items:center;
      gap:10px;
      background:#0c0a15;
      border:1px solid #26203c;
      padding:10px 12px;
      border-radius:6px;
      margin-bottom:8px;
    }
    .bdg{
      font-size:10px;
      padding:4px 8px;
      border-radius:999px;
      font-weight:800;
    }
    .host{ background:#d97706; color:#111; }
    .ready{ background:#059669; color:#fff; }
    .notready{ background:#3b334f; color:#d4c9f7; }

    /* ROLE */
    #s-role{
      background:#09070f;
      padding:18px;
    }
    .rbox{
      width:min(390px,100%);
      background:#110f1e;
      border:2px solid #6c3aed;
      border-radius:10px;
      padding:28px 24px;
      text-align:center;
    }
    .ri{ font-size:72px; margin-bottom:8px; }
    .rt{
      font-family:'Press Start 2P', monospace;
      font-size:16px;
      line-height:1.8;
      margin-bottom:12px;
    }
    .rd{
      color:#9a8abf;
      font-size:13px;
      line-height:1.9;
    }

    /* GAME */
    #s-game{ background:#000; }
    canvas{ display:block; }

    .hud{
      position:fixed;
      top:0; left:0; right:0;
      z-index:20;
      display:flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      background:rgba(9,7,15,.92);
      border-bottom:2px solid #6c3aed;
      backdrop-filter:blur(6px);
    }
    .hud-left,.hud-mid,.hud-right{
      font-family:'Press Start 2P', monospace;
      font-size:9px;
      line-height:1.6;
    }
    .hud-left{ color:#b295ff; min-width:82px; }
    .hud-mid{ flex:1; color:#fbbf24; text-align:center; }
    .hud-right{ color:#ef4444; min-width:60px; text-align:left; }

    .event-banner{
      position:fixed;
      top:52px;
      left:50%;
      transform:translateX(-50%);
      z-index:21;
      background:rgba(17,15,30,.95);
      border:2px solid #d97706;
      color:#ffd084;
      border-radius:999px;
      padding:8px 16px;
      font-family:'Press Start 2P', monospace;
      font-size:9px;
      display:none;
      box-shadow:0 0 16px rgba(217,119,6,.25);
    }
    .event-banner.on{ display:block; }

    .abar{
      position:fixed;
      left:0; right:0; bottom:0;
      z-index:20;
      display:flex;
      gap:6px;
      padding:6px;
      background:rgba(9,7,15,.92);
      border-top:2px solid #6c3aed;
      backdrop-filter:blur(6px);
    }
    .abtn{
      flex:1;
      border:none;
      border-radius:6px;
      padding:8px 5px;
      cursor:pointer;
      font-family:'Press Start 2P', monospace;
      font-size:7px;
      line-height:1.5;
      font-weight:800;
    }
    .at{ background:#d97706; color:#111; }
    .ak{ background:#c0392b; color:#fff; }
    .ar{ background:#252040; color:#eee7ff; }
    .as{ background:#2563eb; color:#fff; }
    .ae{ background:#171427; color:#8d7cb8; border:1px solid #383255; }

    .dpad{
      position:fixed;
      bottom:82px;
      left:10px;
      display:grid;
      grid-template-columns:repeat(3,46px);
      grid-template-rows:repeat(3,46px);
      gap:4px;
      z-index:20;
    }
    .dp{
      width:46px;
      height:46px;
      border-radius:8px;
      border:2px solid rgba(178,149,255,.35);
      background:rgba(108,58,237,.25);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      user-select:none;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .dp:active{ background:rgba(108,58,237,.6); }
    .dp.blank{ background:transparent; border:none; }

    /* VOTE */
    #s-vote{
      background:#09070f;
      justify-content:flex-start;
      gap:10px;
      padding:16px 14px 22px;
      overflow-y:auto;
    }
    .vtitle{
      font-family:'Press Start 2P', monospace;
      font-size:13px;
      color:#b295ff;
      text-align:center;
      margin-top:4px;
    }
    .cbox{
      width:min(560px,100%);
      background:#110f1e;
      border:1px solid #3d345f;
      border-radius:8px;
      padding:10px;
      max-height:130px;
      overflow-y:auto;
    }
    .cm{
      font-size:12px;
      line-height:1.8;
      border-bottom:1px solid #26203c;
      padding:3px 0;
    }
    .cm:last-child{ border-bottom:none; }
    .crow2{
      width:min(560px,100%);
      display:flex;
      gap:8px;
    }
    .vgrid{
      width:min(560px,100%);
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(105px,1fr));
      gap:8px;
    }
    .vc{
      background:#110f1e;
      border:2px solid #26203c;
      border-radius:8px;
      padding:10px 8px;
      text-align:center;
      cursor:pointer;
    }
    .vc:hover{ border-color:#b295ff; }
    .vc.myv{ border-color:#ef4444; }
    .vca{ font-size:26px; }
    .vcn{ font-size:11px; font-weight:800; margin-top:3px; }
    .vcc{ font-size:10px; color:#8d7cb8; margin-top:2px; }

    /* RESULT */
    #s-result{
      background:radial-gradient(circle at top,#1f1248 0%, #09070f 65%);
      padding:18px;
    }
    .resico{
      font-size:84px;
      animation:floaty 2s ease-in-out infinite;
    }
    .restitle{
      font-family:'Press Start 2P', monospace;
      font-size:18px;
      line-height:1.8;
      text-align:center;
      margin:16px 0 8px;
    }
    .resdesc{
      color:#9a8abf;
      font-size:13px;
      line-height:1.9;
      max-width:360px;
      text-align:center;
    }
    @keyframes floaty{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-12px); }
    }

    /* MODALS */
    .ow{
      position:fixed;
      inset:0;
      z-index:100;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(7,5,13,.9);
      padding:14px;
    }
    .ow.on{ display:flex; }
    .ob{
      width:min(320px,100%);
      background:#110f1e;
      border:2px solid #6c3aed;
      border-radius:10px;
      padding:22px 20px;
      text-align:center;
    }
    .ob h2{
      font-family:'Press Start 2P', monospace;
      font-size:12px;
      line-height:1.8;
      color:#b295ff;
      margin-bottom:12px;
    }

    ::-webkit-scrollbar{ width:4px; height:4px; }
    ::-webkit-scrollbar-thumb{ background:#6c3aed; border-radius:99px; }
    ::-webkit-scrollbar-track{ background:#100d18; }
  </style>
</head>
<body>

  <!-- LAND -->
  <div id="s-land" class="screen on">
    <div style="font-size:58px; animation:floaty 3s ease-in-out infinite;">👻</div>
    <div class="title">הבית הארור</div>
    <div class="sub">REAL-TIME MULTIPLAYER</div>

    <div class="card">
      <div>
        <div class="lbl">שמך</div>
        <input id="inp-name" class="inp" maxlength="16" placeholder="Enter name..." />
      </div>

      <div>
        <div class="lbl">מגדר</div>
        <div class="row">
          <button class="gbtn on" id="gm" onclick="setGender('m')">👨 גבר</button>
          <button class="gbtn" id="gf" onclick="setGender('f')">👩 אישה</button>
        </div>
      </div>

      <div>
        <div class="lbl">דמות</div>
        <div class="avrow" id="avrow"></div>
      </div>

      <div>
        <div class="lbl">צבע</div>
        <div class="crow" id="crow"></div>
      </div>

      <button class="btn bp" onclick="createRoom()">✨ צור חדר חדש</button>

      <div style="text-align:center; font-size:11px; color:#50456d;">— או —</div>

      <div>
        <div class="lbl">קוד חדר</div>
        <input id="inp-code" class="inp" maxlength="6" placeholder="XXXXXX" style="letter-spacing:6px;text-align:center;font-size:18px;font-family:monospace;" />
      </div>

      <button class="btn bg" onclick="joinRoom()">🚪 הצטרף</button>
    </div>
  </div>

  <!-- LOBBY -->
  <div id="s-lobby" class="screen">
    <div class="px" style="font-size:13px;color:#b295ff;margin-bottom:14px;">LOBBY</div>
    <div class="lbox">
      <div style="text-align:center;font-size:11px;color:#8d7cb8;margin-bottom:5px;">שתף קוד עם חברים:</div>
      <div class="rcode" id="lob-code">------</div>
      <div id="lob-pls"></div>
      <div id="lob-st" style="text-align:center;font-size:12px;color:#9a8abf;margin:8px 0 10px;"></div>

      <div class="row" style="flex-direction:column;">
        <button class="btn bg" id="btn-ready" onclick="toggleReady()">✅ אני מוכן</button>
        <button class="btn bp" id="btn-start" style="display:none;" onclick="hostStart()">▶ התחל משחק</button>
        <button class="btn bg" onclick="leaveRoom()">← צא</button>
      </div>
    </div>
  </div>

  <!-- ROLE -->
  <div id="s-role" class="screen">
    <div class="rbox">
      <div class="ri" id="r-ico"></div>
      <div class="rt" id="r-ttl"></div>
      <div class="rd" id="r-dsc"></div>
    </div>
    <button class="btn bp" style="max-width:240px;margin-top:14px;" onclick="confirmRoleReady()">משחקים! 🎮</button>
  </div>

  <!-- GAME -->
  <div id="s-game" class="screen">
    <div class="hud">
      <div class="hud-left">👁 הבית הארור</div>
      <div class="hud-mid" id="hud-tasks">משימות: 0/0</div>
      <div class="hud-right" id="hud-timer">0:00</div>
    </div>

    <div class="event-banner" id="event-banner"></div>
    <canvas id="gc"></canvas>

    <div class="abar" id="abar"></div>

    <div class="dpad" id="dpad">
      <div class="dp blank"></div>
      <div class="dp" onpointerdown="dpadDir(0,-1)" onpointerup="dpadStop()" onpointercancel="dpadStop()">▲</div>
      <div class="dp blank"></div>

      <div class="dp" onpointerdown="dpadDir(-1,0)" onpointerup="dpadStop()" onpointercancel="dpadStop()">◀</div>
      <div class="dp blank"></div>
      <div class="dp" onpointerdown="dpadDir(1,0)" onpointerup="dpadStop()" onpointercancel="dpadStop()">▶</div>

      <div class="dp blank"></div>
      <div class="dp" onpointerdown="dpadDir(0,1)" onpointerup="dpadStop()" onpointercancel="dpadStop()">▼</div>
      <div class="dp blank"></div>
    </div>
  </div>

  <!-- VOTE -->
  <div id="s-vote" class="screen">
    <div class="vtitle">🗳 ישיבת חירום</div>
    <div class="cbox" id="cbox"></div>
    <div class="crow2">
      <input id="chat-in" class="inp" placeholder="תכתוב משהו..." onkeydown="if(event.key==='Enter')sendChat()" />
      <button class="btn bp" style="width:auto;padding:9px 12px;" onclick="sendChat()">שלח</button>
    </div>
    <div class="vgrid" id="vgrid"></div>
    <button class="btn bgo" id="btn-resolve" style="max-width:240px;display:none;" onclick="resolveVote()">📊 סיים הצבעה</button>
  </div>

  <!-- RESULT -->
  <div id="s-result" class="screen">
    <div class="resico" id="res-ico"></div>
    <div class="restitle" id="res-ttl"></div>
    <div class="resdesc" id="res-dsc"></div>
    <button class="btn bp" style="max-width:220px;margin-top:18px;" onclick="goLand()">🔄 שחק שוב</button>
  </div>

  <!-- TASK -->
  <div class="ow" id="ov-task">
    <div class="ob">
      <h2 id="ot-h"></h2>
      <div id="ot-i" style="font-size:52px;margin:8px 0;"></div>
      <div id="ot-d" style="font-size:13px;color:#9a8abf;line-height:1.8;margin-bottom:14px;"></div>
      <button class="btn bgo" onclick="completeTask()">✓ השלם</button>
      <br /><br />
      <button class="btn bg" onclick="closeOverlay('ov-task')">ביטול</button>
    </div>
  </div>

  <!-- KILL -->
  <div class="ow" id="ov-kill">
    <div class="ob">
      <h2 style="color:#ef4444;">💀 חסל?</h2>
      <div id="ok-av" style="font-size:52px;margin:8px 0;"></div>
      <div style="font-size:13px;color:#9a8abf;line-height:1.8;margin-bottom:14px;">
        לחסל את <strong id="ok-nm"></strong>?
      </div>
      <button class="btn br" onclick="confirmKill()">חסל</button>
      <br /><br />
      <button class="btn bg" onclick="closeOverlay('ov-kill')">ביטול</button>
    </div>
  </div>

  <!-- REPORT -->
  <div class="ow" id="ov-report">
    <div class="ob">
      <h2>🚨 דיווח על גופה</h2>
      <div style="font-size:13px;color:#9a8abf;line-height:1.8;margin-bottom:14px;">
        לזמן ישיבת חירום?
      </div>
      <button class="btn br" onclick="confirmReport()">דווח</button>
      <br /><br />
      <button class="btn bg" onclick="closeOverlay('ov-report')">ביטול</button>
    </div>
  </div>

      { name:'מרתף', cx:16, cy:7, color:'#120808' },
      { name:'אמבטיה', cx:2, cy:13, color:'#081218' },
      { name:'חדר ילדים', cx:9, cy:13, color:'#0f1208' },
      { name:'עליית גג', cx:16, cy:13, color:'#130d18' },
    ];

    const TASK_DEFS = [
      { name:'תקן חשמל', icon:'⚡', desc:'החיווט שרוף. תקן אותו.' },
      { name:'מצא מפתח', icon:'🗝', desc:'מפתח נסתר איפשהו בחדר.' },
      { name:'נקה כתם', icon:'🧹', desc:'משהו מוזר נזל על הרצפה.' },
      { name:'הדלק נרות', icon:'🕯', desc:'צריך אור. הדלק אותם.' },
      { name:'שדר SOS', icon:'📻', desc:'תשלח אות מצוקה.' },
      { name:'הרכב שלד', icon:'💀', desc:'אסור לשאול למה.' },
      { name:'טארוט', icon:'🃏', desc:'סדר את הקלפים נכון.' },
      { name:'תקן שעון', icon:'🕰', desc:'הזמן קפא על 3:00.' },
      { name:'ספר קללה', icon:'📖', desc:'מצא את הדף הנכון.' }
    ];

    const TASK_POS = [
      { tx:2, ty:2 }, { tx:9, ty:2 }, { tx:16, ty:2 },
      { tx:2, ty:7 }, { tx:9, ty:7 }, { tx:16, ty:7 },
      { tx:2, ty:13 }, { tx:9, ty:13 }, { tx:16, ty:13 },
    ];

    const STARTS = [
      { x:2.5, y:3 },
      { x:9.5, y:3 },
      { x:16.5, y:3 },
      { x:2.5, y:8 },
      { x:9.5, y:8 },
      { x:16.5, y:8 },
      { x:5.0, y:5.0 },
      { x:12.0, y:12.0 },
    ];

    const EVENT_TEXT = {
      blackout: '⚡ הפסקת חשמל',
      footsteps: '👣 צעדים מסתוריים',
      fakeghost: '👻 הופעת רוח'
    };

    // =========================================================
    // STATE
    // =========================================================
    let db = null;
    let roomListener = null;

    let myId = 'p' + Date.now() + Math.random().toString(36).slice(2,6);
    let myName = 'שחקן';
    let myGender = 'm';
    let myAvIdx = 0;
    let myColor = 0;

    let roomCode = null;
    let isHost = false;
    let gs = null;

    let canvas = null;
    let ctx = null;

    let myX = 2.5, myY = 2.5;
    let camX = 0, camY = 0;
    let keys = {};
    let dpadVel = { x:0, y:0 };
    let lastLoop = 0;
    let lastPosUpdate = 0;
    let animFrame = 0;
    let animTimer = 0;
    let killCooldownLocal = 0;
    let particles = [];
    let noiseBursts = [];
    let lastNoiseEmit = 0;

    let activeTaskId = null;
    let killTarget = null;
    let gameStartedLocal = false;

    // =========================================================
    // INIT
    // =========================================================
    function initFB(){
      if(db) return true;
      try{
        if(!firebase.apps.length) firebase.initializeApp(FB);
        db = firebase.database();
        return true;
      }catch(err){
        alert('Firebase error: ' + err.message);
        return false;
      }
    }

    function buildUI(){
      document.getElementById('crow').innerHTML = COLORS.map((c,i)=>
        `<div class="cd${i===myColor?' on':''}" style="background:${c}" onclick="pickColor(${i})"></div>`
      ).join('');

      const avs = myGender === 'm' ? AVM : AVF;
      document.getElementById('avrow').innerHTML = avs.map((a,i)=>
        `<div class="av${i===myAvIdx?' on':''}" onclick="pickAvatar(${i})">${a}</div>`
      ).join('');
    }

    function pickColor(i){ myColor = i; buildUI(); }
    function pickAvatar(i){ myAvIdx = i; buildUI(); }

    function setGender(g){
      myGender = g;
      myAvIdx = 0;
      document.getElementById('gm').classList.toggle('on', g === 'm');
      document.getElementById('gf').classList.toggle('on', g === 'f');
      buildUI();
    }

    function getAvatar(){
      return (myGender === 'm' ? AVM : AVF)[myAvIdx] || '🧑';
    }

    function currentScreen(){
      const s = document.querySelector('.screen.on');
      return s ? s.id : '';
    }

    function go(screenId){
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('on'));
      const el = document.getElementById(screenId);
      if(el) el.classList.add('on');
    }

    function openOverlay(id){
      const el = document.getElementById(id);
      if(el) el.classList.add('on');
    }
    function closeOverlay(id){
      const el = document.getElementById(id);
      if(el) el.classList.remove('on');
    }

    // =========================================================
    // ROOM HELPERS
    // =========================================================
    function buildPlayer(index){
      const s = STARTS[index % STARTS.length];
      return {
        id: myId,
        name: myName,
        color: myColor,
        avatar: getAvatar(),
        alive: true,
        isGhost: false,
        x: s.x,
        y: s.y,
        ready: false
      };
    }

    function stopRoomListen(){
      if(roomListener && roomCode && db){
        db.ref('rooms/' + roomCode).off('value', roomListener);
        roomListener = null;
      }
    }

    function listenRoom(){
      stopRoomListen();
      roomListener = db.ref('rooms/' + roomCode).on('value', snap => {
        if(!snap.exists()) return;
        gs = snap.val();
        onState();
      });
    }

    async function createRoom(){
      if(!initFB()) return;

      myName = document.getElementById('inp-name').value.trim() || 'שחקן';
      roomCode = String(Math.floor(100000 + Math.random() * 900000));
      isHost = true;
      gameStartedLocal = false;

      const me = buildPlayer(0);
      myX = me.x;
      myY = me.y;

      await db.ref('rooms/' + roomCode).set({
        host: myId,
        phase: 'lobby',
        winner: null,
        players: { [myId]: me },
        tasks: {},
        bodies: {},
        votes: {},
        chat: {},
        readyRole: {},
        doneTasks: 0,
        totalTasks: 0,
        gameStartAt: 0,
        event: null,
        nextEventAt: 0
      });

      go('s-lobby');
      listenRoom();
    }

    async function joinRoom(){
      if(!initFB()) return;

      myName = document.getElementById('inp-name').value.trim() || 'שחקן';
      const code = document.getElementById('inp-code').value.trim();

      if(code.length !== 6){
        alert('קוד לא תקין');
        return;
      }

      const snap = await db.ref('rooms/' + code).get();
      if(!snap.exists()){
        alert('חדר לא נמצא');
        return;
      }

      const room = snap.val();
      if(room.phase !== 'lobby' && room.phase !== 'role'){
        alert('אי אפשר להצטרף למשחק שכבר התחיל');
        return;
      }

      roomCode = code;
      isHost = room.host === myId;
      gameStartedLocal = false;

      const players = Object.values(room.players || {});
      const usedColors = players.map(p => p.color);

      if(usedColors.includes(myColor)){
        for(let i=0;i<COLORS.length;i++){
          if(!usedColors.includes(i)){
            myColor = i;
            break;
          }
        }
      }

      const me = buildPlayer(players.length);
      myX = me.x;
      myY = me.y;

      await db.ref('rooms/' + roomCode + '/players/' + myId).set(me);

      go('s-lobby');
      listenRoom();
    }

    async function leaveRoom(){
      stopRoomListen();
      if(roomCode && db){
        try{
          await db.ref('rooms/' + roomCode + '/players/' + myId).remove();
          await db.ref('rooms/' + roomCode + '/readyRole/' + myId).remove();
        }catch(e){}
      }
      goLand();
    }

    function goLand(){
      stopRoomListen();
      gs = null;
      roomCode = null;
      isHost = false;
      activeTaskId = null;
      killTarget = null;
      killCooldownLocal = 0;
      keys = {};
      dpadVel = {x:0,y:0};
      particles = [];
      noiseBursts = [];
      gameStartedLocal = false;
      document.getElementById('event-banner').classList.remove('on');
      go('s-land');
    }

    // =========================================================
    // LOBBY
    // =========================================================
    async function toggleReady(){
      if(!roomCode || !gs || !gs.players || !gs.players[myId]) return;
      const cur = !!gs.players[myId].ready;
      await db.ref('rooms/' + roomCode + '/players/' + myId + '/ready').set(!cur);
    }

    function renderLobby(){
      const players = Object.values(gs.players || {});
      const hostId = gs.host;

      document.getElementById('lob-code').textContent = roomCode || '------';
      document.getElementById('lob-pls').innerHTML = players.map(p => `
        <div class="pc">
          <div style="font-size:22px">${p.avatar || '🧑'}</div>
          <div style="flex:1">
            <div style="font-weight:800;color:${COLORS[p.color]}">${p.name}${p.id===myId?' (אני)':''}</div>
          </div>
          ${p.id===hostId ? `<span class="bdg host">HOST</span>` : ''}
          <span class="bdg ${p.ready ? 'ready':'notready'}">${p.ready ? 'READY':'WAIT'}</span>
        </div>
      `).join('');

      const readyCount = players.filter(p => p.ready).length;
      document.getElementById('lob-st').textContent = `${players.length} שחקנים · ${readyCount} מוכנים`;

      const allReady = players.length >= 2 && players.every(p => p.ready);
      document.getElementById('btn-start').style.display = isHost ? 'block' : 'none';
      document.getElementById('btn-start').disabled = !allReady;
      document.getElementById('btn-start').style.opacity = allReady ? '1' : '.55';

      const me = gs.players[myId];
      document.getElementById('btn-ready').textContent = me && me.ready ? '❌ בטל מוכנות' : '✅ אני מוכן';
    }

    async function hostStart(){
      if(!isHost || !gs) return;

      const players = Object.values(gs.players || {});
      if(players.length < 2){
        alert('צריך לפחות 2 שחקנים');
        return;
      }
      if(!players.every(p => p.ready)){
        alert('כולם צריכים להיות מוכנים');
        return;
      }

      const ghostIndex = Math.floor(Math.random() * players.length);
      const tasks = {};

      TASK_POS.forEach((pos, i) => {
        tasks['t' + i] = {
          id: 't' + i,
          tx: pos.tx,
          ty: pos.ty,
          defIdx: i % TASK_DEFS.length,
          done: false
        };
      });

      const updates = {
        phase: 'role',
        winner: null,
        tasks,
        bodies: {},
        votes: {},
        chat: {},
        readyRole: {},
        doneTasks: 0,
        totalTasks: TASK_POS.length,
        event: null,
        gameStartAt: 0,
        nextEventAt: 0
      };

      players.forEach((p, i) => {
        const s = STARTS[i % STARTS.length];
        updates[`players/${p.id}/x`] = s.x;
        updates[`players/${p.id}/y`] = s.y;
        updates[`players/${p.id}/alive`] = true;
        updates[`players/${p.id}/isGhost`] = i === ghostIndex;
        updates[`players/${p.id}/ready`] = false;
      });

      await db.ref('rooms/' + roomCode).update(updates);
    }

    // =========================================================
    // ROLE
    // =========================================================
    function renderRole(){
      const me = gs.players && gs.players[myId];
      if(!me) return;

      if(me.isGhost){
        document.getElementById('r-ico').textContent = '👻';
        document.getElementById('r-ttl').innerHTML = '<span style="color:#ef4444">אתה הרוח</span>';
        document.getElementById('r-dsc').textContent = 'חסל שחקנים בשקט, אל תעורר חשד, ותנצח כשיישאר חוקר אחד בלבד.';
      }else{
        document.getElementById('r-ico').textContent = '🕵️';
        document.getElementById('r-ttl').innerHTML = '<span style="color:#b295ff">אתה חוקר</span>';
        document.getElementById('r-dsc').textContent = 'השלם משימות, שים לב לגופות, ונסה להבין מי הרוח לפני שיהיה מאוחר מדי.';
      }
    }

    async function confirmRoleReady(){
      if(!roomCode || !gs) return;

      await db.ref('rooms/' + roomCode + '/readyRole/' + myId).set(true);

      if(isHost){
        const snap = await db.ref('rooms/' + roomCode).get();
        if(!snap.exists()) return;
        const room = snap.val();

        const playerIds = Object.keys(room.players || {});
        const readyIds = Object.keys(room.readyRole || {});
        const everyoneReady = playerIds.length > 0 && playerIds.every(id => readyIds.includes(id));

        if(everyoneReady){
          await db.ref('rooms/' + roomCode).update({
            phase: 'game',
            gameStartAt: Date.now(),
            nextEventAt: Date.now() + rand(EVENT_INTERVAL_MIN, EVENT_INTERVAL_MAX)
          });
        }
      }
    }

    // =========================================================
    // STATE ROUTER
    // =========================================================
    function onState(){
      if(!gs) return;

      if(gs.phase === 'lobby'){
        if(currentScreen() !== 's-lobby') go('s-lobby');
        renderLobby();
      }

      if(gs.phase === 'role'){
        if(currentScreen() !== 's-role') go('s-role');
        renderRole();
      }

      if(gs.phase === 'game'){
        onGame();
      }

      if(gs.phase === 'vote'){
        if(currentScreen() !== 's-vote') go('s-vote');
        renderVote();
      }

      if(gs.phase === 'result'){
        if(currentScreen() !== 's-result') go('s-result');
        renderResult();
      }
    }

    // =========================================================
    // GAME START / LOOP
    // =========================================================
    function onGame(){
      const me = gs.players && gs.players[myId];
      if(me){
        if(!gameStartedLocal){
          myX = me.x || 2.5;
          myY = me.y || 2.5;
          startGame();
          gameStartedLocal = true;
        }
      }

      if(isHost) hostTick();
    }

    function startGame(){
      go('s-game');
      canvas = document.getElementById('gc');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      lastLoop = performance.now();
      requestAnimationFrame(loop);
    }

    function resizeCanvas(){
      if(!canvas) return;
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function loop(ts){
      if(currentScreen() !== 's-game'){
        requestAnimationFrame(loop);
        return;
      }

      const dt = Math.min((ts - lastLoop) / 1000, 0.05);
      lastLoop = ts;

      updatePlayer(dt, ts);
      updateParticles(dt);
      renderGame(ts);

      requestAnimationFrame(loop);
    }

    // =========================================================
    // HOST EVENT TICK
    // =========================================================
    async function hostTick(){
      if(!gs || gs.phase !== 'game') return;

      const now = Date.now();
      const ev = gs.event;

      if(ev && ev.endsAt <= now){
        await db.ref('rooms/' + roomCode + '/event').set(null);
        await db.ref('rooms/' + roomCode + '/nextEventAt').set(now + rand(EVENT_INTERVAL_MIN, EVENT_INTERVAL_MAX));
        return;
      }

      if(!ev && gs.nextEventAt && now >= gs.nextEventAt){
        const types = ['blackout','footsteps','fakeghost'];
        const type = types[Math.floor(Math.random() * types.length)];
        await db.ref('rooms/' + roomCode + '/event').set({
          type,
          startedAt: now,
          endsAt: now + EVENT_DURATION
        });
        return;
      }

      await checkWin();
    }

    // =========================================================
    // PLAYER UPDATE
    // =========================================================
    function updatePlayer(dt, ts){
      if(!gs || !gs.players || !gs.players[myId]) return;

      const me = gs.players[myId];
      if(!me.alive) return;

      let dx = 0;
      let dy = 0;

      if(keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
      if(keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
      if(keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
      if(keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;

      dx += dpadVel.x;
      dy += dpadVel.y;

      const moving = dx !== 0 || dy !== 0;
      const sprinting = !me.isGhost && moving && (keys['Shift'] || keys[' ']);

      if(dx !== 0 && dy !== 0){
        dx *= 0.707;
        dy *= 0.707;
      }

      const curSpeed = SPEED * (sprinting ? SPRINT_MULT : 1);
      const step = curSpeed * dt;
      const nx = myX + dx * step;
      const ny = myY + dy * step;

      const ok = (x, y) => {
        const m = 0.24;
        return canWalk(x-m,y-m) && canWalk(x+m,y-m) && canWalk(x-m,y+m) && canWalk(x+m,y+m);
      };

      if(ok(nx, myY)) myX = nx;
      if(ok(myX, ny)) myY = ny;

      if(moving){
        animTimer += dt;
        if(animTimer >= 0.14){
          animTimer = 0;
          animFrame = (animFrame + 1) % 4;
        }
      }else{
        animFrame = 0;
      }

      if(killCooldownLocal > 0){
        killCooldownLocal = Math.max(0, killCooldownLocal - dt * 1000);
      }

      // sprint noise
      if(sprinting && ts - lastNoiseEmit > 240){
        lastNoiseEmit = ts;
        noiseBursts.push({
          x: myX * TS + TS/2,
          y: myY * TS + TS/2,
          r: 10,
          maxR: 52,
          a: .55
        });
      }

      if(ts - lastPosUpdate > 85){
        lastPosUpdate = ts;
        db.ref('rooms/' + roomCode + '/players/' + myId).update({
          x: myX,
          y: myY
        });
      }
    }

    function canWalk(x,y){
      const r = Math.floor(y);
      const c = Math.floor(x);
      if(r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
      return MAP[r][c] === 1;
    }

    function dpadDir(x,y){ dpadVel.x = x; dpadVel.y = y; }
    function dpadStop(){ dpadVel.x = 0; dpadVel.y = 0; }

    // =========================================================
    // PARTICLES
    // =========================================================
    function updateParticles(dt){
      particles = particles.filter(p => {
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 4 * dt;
        return p.life > 0;
      });

      noiseBursts = noiseBursts.filter(n => {
        n.r += 90 * dt;
        n.a -= 0.8 * dt;
        return n.a > 0;
      });
    }

    function spawnKillFX(wx, wy){
      for(let i=0;i<12;i++){
        const a = Math.random() * Math.PI * 2;
        const sp = 50 + Math.random() * 120;
        particles.push({
          x: wx,
          y: wy,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp - 50,
          life: .7 + Math.random() * .5,
          char: ['💀','🩸','💨','👻'][i%4],
          size: 20 + Math.random() * 8
        });
      }
    }

    // =========================================================
    // RENDER
    // =========================================================
    function renderGame(ts){
      if(!canvas || !ctx || !gs) return;

      const W = canvas.width;
      const H = canvas.height;

      ctx.clearRect(0,0,W,H);

      const me = gs.players[myId];
      const followX = (myX * TS) - W/2 + TS/2;
      const followY = (myY * TS) - H/2 + TS/2;
      camX += (followX - camX) * 0.12;
      camY += (followY - camY) * 0.12;
      camX = clamp(camX, 0, Math.max(0, COLS*TS - W));
      camY = clamp(camY, 0, Math.max(0, ROWS*TS - H));

      ctx.save();
      ctx.translate(-camX, -camY);

      const c0 = Math.max(0, Math.floor(camX / TS) - 1);
      const c1 = Math.min(COLS, Math.ceil((camX + W) / TS) + 1);
      const r0 = Math.max(0, Math.floor(camY / TS) - 1);
      const r1 = Math.min(ROWS, Math.ceil((camY + H) / TS) + 1);

      for(let r=r0; r<r1; r++){
        for(let c=c0; c<c1; c++){
          const x = c * TS;
          const y = r * TS;
          const tile = MAP[r][c];

          if(tile === 0){
            ctx.fillStyle = '#0d0b16';
            ctx.fillRect(x,y,TS,TS);
            ctx.fillStyle = '#1a1730';
            ctx.fillRect(x+1,y+1,TS-2,5);
            ctx.fillStyle = '#080614';
            ctx.fillRect(x+1,y+TS-4,TS-2,3);
          }else{
            let fc = '#131025';
            const room = ROOM_INFO.find(rm => Math.abs(c-rm.cx)<=4 && Math.abs(r-rm.cy)<=4);
            if(room) fc = room.color;
            ctx.fillStyle = fc;
            ctx.fillRect(x,y,TS,TS);
            ctx.strokeStyle = 'rgba(255,255,255,.04)';
            ctx.strokeRect(x,y,TS,TS);
            if((r+c)%3===0){
              ctx.fillStyle = 'rgba(0,0,0,.06)';
              ctx.fillRect(x+2,y+2,TS-4,TS-4);
            }
          }
        }
      }

      // room labels
      ctx.font = 'bold 11px Heebo';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(178,149,255,.35)';
      ROOM_INFO.forEach(rm => {
        ctx.fillText(rm.name, rm.cx*TS + TS/2, (rm.cy-3)*TS);
      });

      // tasks
      Object.values(gs.tasks || {}).forEach(t => {
        if(t.done) return;
        const px = t.tx * TS;
        const py = t.ty * TS;
        const pulse = 0.6 + 0.4 * Math.sin(ts / 350);

        ctx.save();
        ctx.shadowBlur = 18 * pulse;
        ctx.shadowColor = '#d97706';
        ctx.font = '25px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(TASK_DEFS[t.defIdx].icon, px + TS/2, py + TS/2);
        ctx.restore();

        ctx.strokeStyle = `rgba(217,119,6,${0.25 + pulse * .45})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(px+4, py+4, TS-8, TS-8);
      });

      // bodies
      Object.values(gs.bodies || {}).forEach(b => {
        const px = b.tx * TS;
        const py = b.ty * TS;

        ctx.fillStyle = 'rgba(192,57,43,.22)';
        ctx.fillRect(px, py+TS*.56, TS, TS*.36);

        ctx.font = '28px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('💀', px + TS/2, py + TS*.68);

        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 9px Heebo';
        ctx.fillText(b.pname || '', px + TS/2, py + TS - 5);
      });

      // fake ghost event visual
      if(gs.event && gs.event.type === 'fakeghost'){
        const fx = 9.5 * TS;
        const fy = 7 * TS;
        ctx.globalAlpha = .6 + .2 * Math.sin(ts / 200);
        ctx.font = '40px serif';
        ctx.textAlign = 'center';
        ctx.fillText('👻', fx, fy);
        ctx.globalAlpha = 1;
      }

      // footsteps event visual
      if(gs.event && gs.event.type === 'footsteps'){
        const path = [
          [4,3],[5,4],[6,5],[7,6],[8,7],[9,8],[10,9]
        ];
        ctx.globalAlpha = .6;
        ctx.font = '18px serif';
        path.forEach((p, i) => {
          if(i % 2 === 0) ctx.fillText('👣', p[0]*TS+TS/2, p[1]*TS+TS/2);
        });
        ctx.globalAlpha = 1;
      }

      // players
      Object.values(gs.players || {}).forEach(p => {
        const isMe = p.id === myId;
        const px = (isMe ? myX : p.x) * TS;
        const py = (isMe ? myY : p.y) * TS;

        if(!p.alive){
          ctx.globalAlpha = .22;
          ctx.font = '26px serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('👻', px + TS/2, py + TS/2);
          ctx.globalAlpha = 1;
          return;
        }

        drawPlayer(ctx, px, py, p, isMe, ts);
      });

      // noise bursts
      noiseBursts.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(59,130,246,${n.a})`;
        ctx.lineWidth = 3;
        ctx.stroke();
      });

      // kill fx
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.font = `${p.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.char, p.x, p.y);
      });
      ctx.globalAlpha = 1;

      // lighting
      applyLighting(ctx, me, W, H, ts);

      ctx.restore();

      updateHUD(ts);
      renderEventBanner();
    }

    function drawPlayer(ctx, px, py, p, isMe, ts){
      const col = COLORS[p.color];
      const bw = TS * .52;
      const bh = TS * .6;
      const bx = px + (TS-bw)/2;
      const by = py + TS*.22;

      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.beginPath();
      ctx.ellipse(px+TS/2, py+TS*.9, bw*.4, TS*.08, 0, 0, Math.PI*2);
      ctx.fill();

      if(p.isGhost && isMe){
        ctx.save();
        ctx.globalAlpha = .18 + .08 * Math.sin(ts / 230);
        ctx.fillStyle = 'rgba(239,68,68,.8)';
        roundRect(ctx, bx-5, by-bh*.4, bw+10, bh+bh*.45, 14, true, false);
        ctx.restore();
      }

      ctx.fillStyle = col;
      roundRect(ctx, bx, by, bw, bh, 14, true, false);

      ctx.fillStyle = 'rgba(255,255,255,.12)';
      roundRect(ctx, bx+bw*.1, by+bh*.06, bw*.35, bh*.32, 6, true, false);

      ctx.fillStyle = darken(col, .66);
      roundRect(ctx, bx-bw*.2, by+bh*.1, bw*.2, bh*.5, 4, true, false);

      const hx = bx+bw*.08;
      const hy = by-bh*.38;
      const hw = bw*.84;
      const hh = bh*.44;
      ctx.fillStyle = 'rgba(160,210,255,.82)';
      roundRect(ctx, hx, hy, hw, hh, 12, true, false);
      ctx.strokeStyle = 'rgba(100,170,240,.5)';
      ctx.lineWidth = 1.5;
      roundRect(ctx, hx, hy, hw, hh, 12, false, true);

      ctx.font = `${TS*.26}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.avatar || '🧑', px+TS/2, hy+hh*.52);

      const legAnim = isMe ? Math.sin(animFrame * Math.PI/2) * TS*.06 : 0;
      ctx.fillStyle = darken(col, .75);
      roundRect(ctx, bx+bw*.12, by+bh*.88+legAnim, bw*.3, bh*.28, 4, true, false);
      roundRect(ctx, bx+bw*.56, by+bh*.88-legAnim, bw*.3, bh*.28, 4, true, false);

      const name = p.name + (isMe ? ' ★' : '');
      ctx.font = 'bold 10px Heebo';
      const tw = ctx.measureText(name).width + 10;
      ctx.fillStyle = 'rgba(0,0,0,.65)';
      ctx.fillRect(px + TS/2 - tw/2, py - 16, tw, 13);
      ctx.fillStyle = isMe ? '#fbbf24' : COLORS[p.color];
      ctx.textBaseline = 'top';
      ctx.fillText(name, px + TS/2, py - 16);
    }

    function applyLighting(ctx, me, W, H, ts){
      const event = gs.event;

      let radiusTiles = 3.8;
      if(event && event.type === 'blackout'){
        radiusTiles = me && me.isGhost ? 3.2 : 1.7;
      }

      const cx = myX*TS + TS/2;
      const cy = myY*TS + TS/2;
      const vr = TS * radiusTiles;

      const grad = ctx.createRadialGradient(cx, cy, vr*.42, cx, cy, vr*1.25);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(.45, 'rgba(0,0,0,.10)');
      grad.addColorStop(1, event && event.type === 'blackout' ? 'rgba(0,0,0,.98)' : 'rgba(0,0,0,.93)');
      ctx.fillStyle = grad;
      ctx.fillRect(camX, camY, W, H);
    }

    function updateHUD(ts){
      const done = gs.doneTasks || 0;
      const total = gs.totalTasks || 0;
      document.getElementById('hud-tasks').textContent = `משימות: ${done}/${total}`;

      let elapsed = 0;
      if(gs.gameStartAt){
        elapsed = Math.max(0, Math.floor((Date.now() - gs.gameStartAt) / 1000));
      }
      const m = Math.floor(elapsed / 60);
      const s = String(elapsed % 60).padStart(2,'0');
      document.getElementById('hud-timer').textContent = `${m}:${s}`;

      const me = gs.players && gs.players[myId];
      if(!me || !me.alive){
        document.getElementById('abar').innerHTML = `
          <div style="flex:1;text-align:center;font-family:'Press Start 2P',monospace;font-size:8px;padding:8px;color:#5b4d7c">
            ☠ צופה בלבד
          </div>
        `;
        return;
      }

      const tasks = Object.values(gs.tasks || {});
      const bodies = Object.values(gs.bodies || {});
      const players = Object.values(gs.players || {});

      const taskHere = tasks.find(t => !t.done && Math.hypot(t.tx - myX, t.ty - myY) < 1.15);
      const bodyHere = bodies.find(b => Math.hypot(b.tx - myX, b.ty - myY) < 1.15);
      const nearbyVictims = players.filter(p => p.id !== myId && p.alive && Math.hypot((p.x||0)-myX,(p.y||0)-myY) < KILL_RANGE);

      let html = '';

      if(taskHere){
        html += `<button class="abtn at" onclick="openTask('${taskHere.id}',${taskHere.defIdx})">⚙<br>משימה</button>`;
      }

      if(bodyHere){
        html += `<button class="abtn ar" onclick="openOverlay('ov-report')">🚨<br>דווח</button>`;
      }

      if(me.isGhost){
        if(killCooldownLocal <= 0 && nearbyVictims.length){
          html += `<button class="abtn ak" onclick="pickKill()">💀<br>חסל</button>`;
        }else{
          html += `<button class="abtn ae">${Math.ceil(killCooldownLocal/1000)||0}s<br>cooldown</button>`;
        }
      }else{
        html += `<button class="abtn as">🏃<br>${(keys['Shift']||keys[' '])?'רץ':'ריצה'}</button>`;
      }

      if(!html){
        html = `<div style="flex:1;text-align:center;font-family:'Press Start 2P',monospace;font-size:7px;padding:8px;color:#5b4d7c">WASD / Shift לריצה</div>`;
      }

      document.getElementById('abar').innerHTML = html;
    }

    function renderEventBanner(){
      const el = document.getElementById('event-banner');
      const ev = gs && gs.event;
      if(ev && EVENT_TEXT[ev.type]){
        el.textContent = EVENT_TEXT[ev.type];
        el.classList.add('on');
      }else{
        el.classList.remove('on');
      }
    }

    // =========================================================
    // TASKS
    // =========================================================
    function openTask(id, defIdx){
      activeTaskId = id;
      document.getElementById('ot-h').textContent = TASK_DEFS[defIdx].name;
      document.getElementById('ot-i').textContent = TASK_DEFS[defIdx].icon;
      document.getElementById('ot-d').textContent = TASK_DEFS[defIdx].desc;
      openOverlay('ov-task');
    }

    async function completeTask(){
      closeOverlay('ov-task');
      if(!activeTaskId || !roomCode) return;

      await db.ref('rooms/' + roomCode).transaction(room => {
        if(!room || !room.tasks || !room.tasks[activeTaskId]) return room;
        if(room.tasks[activeTaskId].done) return room;

        room.tasks[activeTaskId].done = true;
        room.doneTasks = (room.doneTasks || 0) + 1;
        return room;
      });

      activeTaskId = null;
    }

    // =========================================================
    // KILL / REPORT
    // =========================================================
    function pickKill(){
      if(!gs || !gs.players || killCooldownLocal > 0) return;
      const players = Object.values(gs.players);
      const nearby = players.filter(p =>
        p.id !== myId &&
        p.alive &&
        Math.hypot((p.x||0)-myX,(p.y||0)-myY) < KILL_RANGE
      );

      if(!nearby.length) return;

      killTarget = nearby[0];
      document.getElementById('ok-av').textContent = killTarget.avatar || '🧑';
      document.getElementById('ok-nm').textContent = killTarget.name;
      openOverlay('ov-kill');
    }

    async function confirmKill(){
      closeOverlay('ov-kill');
      if(!killTarget) return;

      const tx = Math.round(killTarget.x);
      const ty = Math.round(killTarget.y);

      spawnKillFX(killTarget.x * TS, killTarget.y * TS);
      killCooldownLocal = KILL_CD;

      await db.ref('rooms/' + roomCode + '/players/' + killTarget.id + '/alive').set(false);
      await db.ref('rooms/' + roomCode + '/bodies/b' + Date.now()).set({
        tx,
        ty,
        pname: killTarget.name
      });

      killTarget = null;
    }

    async function confirmReport(){
      closeOverlay('ov-report');
      if(!gs || !gs.players || !gs.players[myId]) return;
      const me = gs.players[myId];

      await db.ref('rooms/' + roomCode + '/chat/c' + Date.now()).set({
        name: 'מערכת',
        msg: me.name + ' דיווח על גופה!',
        color: '#ef4444',
        ts: Date.now()
      });

      await db.ref('rooms/' + roomCode).update({
        phase: 'vote',
        votes: {}
      });
    }

    // =========================================================
    // VOTE
    // =========================================================
    function renderVote(){
      const chat = Object.values(gs.chat || {}).sort((a,b) => a.ts - b.ts);
      const votes = gs.votes || {};
      const myVote = votes[myId];
      const alivePlayers = Object.values(gs.players || {}).filter(p => p.alive);

      const box = document.getElementById('cbox');
      box.innerHTML = chat.map(m => `
        <div class="cm"><span style="font-weight:800;color:${m.color || '#b295ff'}">${m.name}: </span>${m.msg}</div>
      `).join('');
      box.scrollTop = box.scrollHeight;

      document.getElementById('vgrid').innerHTML = alivePlayers.map(p => {
        const count = Object.values(votes).filter(v => v === p.id).length;
        return `
          <div class="vc${myVote===p.id?' myv':''}" onclick="castVote('${p.id}')">
            <div class="vca">${p.avatar || '🧑'}</div>
            <div class="vcn" style="color:${COLORS[p.color]}">${p.name}${p.id===myId?' (אני)':''}</div>
            <div class="vcc">${count} קולות</div>
          </div>
        `;
      }).join('') + `
        <div class="vc${myVote==='skip'?' myv':''}" onclick="castVote('skip')">
          <div class="vca">⏭</div>
          <div class="vcn" style="color:#9a8abf">דלג</div>
          <div class="vcc"></div>
        </div>
      `;

      document.getElementById('btn-resolve').style.display = isHost ? 'block' : 'none';
    }

    async function castVote(targetId){
      await db.ref('rooms/' + roomCode + '/votes/' + myId).set(targetId);
    }

    async function sendChat(){
      const inp = document.getElementById('chat-in');
      const msg = inp.value.trim();
      if(!msg || !gs || !gs.players || !gs.players[myId]) return;

      const me = gs.players[myId];
      await db.ref('rooms/' + roomCode + '/chat/c' + Date.now() + Math.random().toString(36).slice(2,4)).set({
        name: me.name,
        msg,
        color: COLORS[me.color],
        ts: Date.now()
      });

      inp.value = '';
    }

    async function resolveVote(){
      if(!isHost || !gs) return;

      const votes = gs.votes || {};
      const tally = {};

      Object.values(votes).forEach(v => {
        if(v !== 'skip') tally[v] = (tally[v] || 0) + 1;
      });

      const sorted = Object.entries(tally).sort((a,b) => b[1] - a[1]);
      const first = sorted[0];
      const second = sorted[1];

      if(first && (!second || first[1] > second[1])){
        const ejectedId = first[0];
        const target = gs.players[ejectedId];
        if(target){
          await db.ref('rooms/' + roomCode + '/players/' + ejectedId + '/alive').set(false);

          if(target.isGhost){
            await db.ref('rooms/' + roomCode).update({
              phase: 'result',
              winner: 'humans'
            });
            return;
          }
        }
      }

      await db.ref('rooms/' + roomCode).update({
        phase: 'game',
        votes: {},
        chat: {}
      });
    }

    // =========================================================
    // RESULT / WIN
    // =========================================================
    async function checkWin(){
      if(!gs || gs.phase === 'vote' || gs.phase === 'result') return;

      const alive = Object.values(gs.players || {}).filter(p => p.alive);
      const ghost = alive.find(p => p.isGhost);
      const humans = alive.filter(p => !p.isGhost);

      if(!ghost){
        await db.ref('rooms/' + roomCode).update({ phase:'result', winner:'humans' });
        return;
      }

      if(humans.length <= 1){
        await db.ref('rooms/' + roomCode).update({ phase:'result', winner:'ghost' });
        return;
      }

      if((gs.doneTasks || 0) >= (gs.totalTasks || 999) && (gs.totalTasks || 0) > 0){
        await db.ref('rooms/' + roomCode).update({ phase:'result', winner:'humans' });
      }
    }

    function renderResult(){
      const ghost = Object.values(gs.players || {}).find(p => p.isGhost);

      if(gs.winner === 'humans'){
        document.getElementById('res-ico').textContent = '🎉';
        document.getElementById('res-ttl').textContent = 'האנשים ניצחו!';
        document.getElementById('res-ttl').style.color = '#b295ff';
        document.getElementById('res-dsc').textContent = `הרוח הייתה ${ghost?.name || '?'}. כל הכבוד.`;
      }else{
        document.getElementById('res-ico').textContent = '👻';
        document.getElementById('res-ttl').textContent = 'הרוח ניצחה!';
        document.getElementById('res-ttl').style.color = '#ef4444';
        document.getElementById('res-dsc').textContent = `${ghost?.name || '?'} השתלט על הבית.`;
      }
    }

    // =========================================================
    // UTIL
    // =========================================================
    function darken(hex, f){
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke){
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
      if(fill) ctx.fill();
      if(stroke) ctx.stroke();
    }

    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function rand(min,max){ return Math.floor(Math.random() * (max-min+1)) + min; }

    // =========================================================
    // INPUTS
    // =========================================================
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if(currentScreen() === 's-game'){
        const blocked = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '];
        if(blocked.includes(e.key)) e.preventDefault();
      }
    }, { passive:false });

    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    window.addEventListener('resize', resizeCanvas);

    // =========================================================
    // BOOT
    // =========================================================
    buildUI();
  </script>
</body>
</html>
